<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Digby Capsim Planner</title>
<style>
:root{--ink:#16202c;--mut:#64748b;--line:#dde4ec;--bg:#f5f7fa;--card:#fff;--nav:#1f3864;
 --acc:#2563eb;--good:#166534;--goodbg:#dcfce7;--warn:#92400e;--warnbg:#fef3c7;
 --bad:#991b1b;--badbg:#fee2e2;--est:#7c3aed}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
 font:14px/1.55 "Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
header{background:var(--nav);color:#fff;padding:12px 20px;display:flex;align-items:center;
 gap:16px;flex-wrap:wrap}
header h1{margin:0;font-size:16px;font-weight:600}
header .sp{flex:1}
header button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);
 padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
header button:hover{background:rgba(255,255,255,.26)}
.rounds{display:flex;gap:5px;padding:10px 20px 0;flex-wrap:wrap;background:var(--bg)}
.rounds button{border:1px solid var(--line);background:var(--card);padding:6px 13px;
 border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut)}
.rounds button.on{background:var(--nav);color:#fff;border-color:var(--nav)}
nav{display:flex;gap:4px;padding:10px 20px 0;flex-wrap:wrap;border-bottom:2px solid var(--line)}
nav button{border:1px solid var(--line);border-bottom:none;background:#eef2f7;padding:8px 16px;
 border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut)}
nav button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 0 0 var(--card)}
.wrap{padding:18px 20px 70px;max-width:1500px}
.card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:15px 17px;
 margin-bottom:16px}
.card h2{margin:0 0 3px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.card p.sub{margin:0 0 10px;font-size:12px;color:var(--mut)}
.row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.col{flex:1;min-width:340px}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center}
th{background:#f2f6fa;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
 color:var(--mut);font-weight:700}
td.l,th.l{text-align:left}
td.name{text-align:left;font-weight:650}
tr.tot td{font-weight:700;background:#f7f9fc;border-top:2px solid var(--nav)}
.num{font-variant-numeric:tabular-nums}
input[type=number],input[type=date],input[type=text]{width:78px;padding:4px 6px;
 border:1px solid var(--line);border-radius:5px;font:inherit;font-size:12.5px;
 text-align:center;background:#fffbe6}
input[type=date]{width:126px}
input:focus{outline:2px solid var(--acc);outline-offset:-1px}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:700}
.yes{background:var(--goodbg);color:var(--good)}
.rough{background:var(--warnbg);color:var(--warn)}
.no{background:var(--badbg);color:var(--bad)}
.est{background:#ede9fe;color:var(--est)}
.legend{display:flex;gap:13px;flex-wrap:wrap;margin-top:9px;font-size:11.5px;color:var(--mut)}
.legend span{display:flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
.bar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer}
.btn{border:1px solid var(--line);background:var(--card);padding:5px 12px;border-radius:6px;
 cursor:pointer;font-size:12px;font-weight:600;color:var(--mut)}
.btn:hover{background:#f2f6fa}
.note{font-size:12px;color:var(--mut);margin-top:11px;line-height:1.6}
.note b{color:var(--warn)}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:14px}
.kpi div{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px;text-align:center}
.kpi b{display:block;font-size:19px;font-weight:700;letter-spacing:-.4px}
.kpi span{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
.flag{padding:8px 12px;border-radius:6px;margin:6px 0;font-size:12.5px;font-weight:600}
.flag.w{background:var(--warnbg);color:var(--warn)}
.flag.e{background:var(--badbg);color:var(--bad)}
.flag.o{background:var(--goodbg);color:var(--good)}
.estmark{color:var(--est);font-weight:700;cursor:help}
.hide{display:none}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--nav);
 color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;
 transition:opacity .25s;pointer-events:none;z-index:99}
#toast.on{opacity:1}
</style>
</head>
<body>

<header>
  <h1>Digby Capsim Planner</h1>
  <span style="font-size:12px;opacity:.75">CP135726_1 &middot; Cost Leader / Product Lifecycle Focus</span>
  <span class="sp"></span>
  <button id="bSave">Save file</button>
  <button id="bLoad">Load file</button>
  <button id="bLink">Copy share link</button>
  <button id="bReset">Reset</button>
  <input type="file" id="fIn" accept=".json" class="hide">
</header>

<div class="rounds" id="rounds"></div>
<nav id="tabs"></nav>
<div class="wrap" id="body"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   DIGBY CAPSIM PLANNER
   Single-file planning tool. No backend. State lives in localStorage, and can be
   exported as JSON or encoded into a share link (#d=...).

   MODEL HONESTY:
     EXACT   - follows published rules or arithmetic: positions, drift, age,
               corridor/overlap geometry, revenue, contribution margin, plant
               investment cost, capacity utilisation, financial roll-ups.
     EST     - marked with a purple dot. Awareness, accessibility and customer
               survey score use curves fitted to the Capstone guide, not the
               sim's exact internals. Calibrate them on the Calibration tab as
               real results come in.
     ABSENT  - material cost and R&D project cost/duration. Capsim's formulas
               could not be reproduced from observed data. Enter them from the
               R&D screen, which computes them live.
   ========================================================================== */

const NR=8, YR0=2027;
const R=r=>`R${r+1} · ${YR0+r}`;

/* ---- segment geometry: measured out of the Capsim chart SVG ---------------
   Circles are centred on the SEGMENT CENTRE. The IDEAL SPOT is at a fixed
   offset. Consideration (fine 2.5 / rough 4.0) is judged from the centre;
   positioning score from the ideal spot. Radii measured 2.53 and 4.02.        */
const SEG=[
 {n:"Traditional",cp:5.7,cs:14.3,ox:0,oy:0,dp:.7,ds:-.7,age:2.0,mlo:14000,mhi:19000,
  plo:19.5,phi:29.5,w:{age:.47,price:.23,pos:.21,mtbf:.09},c:"#2563eb",u26:6156,g:.099},
 {n:"Low End",cp:3.0,cs:17.0,ox:-.8,oy:.8,dp:.5,ds:-.5,age:7.0,mlo:12000,mhi:17000,
  plo:14.5,phi:24.5,w:{price:.53,age:.24,pos:.16,mtbf:.07},c:"#059669",u26:7467,g:.126},
 {n:"High End",cp:8.4,cs:11.6,ox:1.4,oy:-1.4,dp:.9,ds:-.9,age:0,mlo:20000,mhi:25000,
  plo:29.5,phi:39.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#dc2626",u26:2128,g:.169},
 {n:"Performance",cp:9.0,cs:16.3,ox:1.4,oy:-1.0,dp:1.0,ds:-.7,age:1.0,mlo:22000,mhi:27000,
  plo:24.5,phi:34.5,w:{mtbf:.43,pos:.29,price:.19,age:.09},c:"#d97706",u26:1596,g:.209},
 {n:"Size",cp:3.7,cs:11.0,ox:1.0,oy:-1.4,dp:.7,ds:-1.0,age:1.5,mlo:16000,mhi:21000,
  plo:24.5,phi:34.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#7c3aed",u26:1653,g:.190}
];
const PRICE_DRIFT=-0.50;
const centreAt=(i,r)=>({p:+(SEG[i].cp+SEG[i].dp*r).toFixed(2),s:+(SEG[i].cs+SEG[i].ds*r).toFixed(2)});
const idealAt=(i,r)=>{const c=centreAt(i,r);
  return {p:+(c.p+SEG[i].ox).toFixed(2),s:+(c.s+SEG[i].oy).toFixed(2)};};
const priceLo=(i,r)=>SEG[i].plo+PRICE_DRIFT*r, priceHi=(i,r)=>SEG[i].phi+PRICE_DRIFT*r;
const dist=(a,b,c,d)=>Math.hypot(a-c,b-d);

/* ---- calibration constants (editable) ----------------------------------- */
const DEF_CAL={
  // labour $/unit = laborBase - laborSlope * automation   (fitted to R2 actuals:
  // Daze auto 4.5 -> $8.07, Duck/Dot/Dune auto 3.0 -> $9.94)
  laborBase:13.68, laborSlope:1.2467, shiftPremium:0.5,
  capCost:6.0, autoCost:4.0,        // plant: $6/unit capacity + $4 per automation point
  awarenessKeep:0.667,              // one third of awareness is lost each year
  accessKeep:0.667,
  awareMax:0.87, awareHalf:1400,    // saturating curve: a = max*(1-exp(-b/half*ln2))
  accessMax:0.85, accessHalf:1700,
  taxRate:0.35, depYears:15, interestLT:0.125, interestST:0.1025
};

/* ---- seed state: real Round 1 decisions + current Round 2 board ---------- */
function seed(){
  const P=[
   {n:"Daze",seg:0,sp:5.5,ss:14.5,sm:17500,sa:3.1, r1:[5.7,14.3,14000,"2027-05-09"],
    price:26.50,promo:1500,sales:1600,fc:1360,cap:1800,auto:4.5,sched:1380,inv:404,mat:9.25},
   {n:"Dell",seg:1,sp:3.0,ss:17.0,sm:14000,sa:4.6, r1:[3.0,17.0,12000,"2027-01-30"],
    price:19.50,promo:1500,sales:1425,fc:1750,cap:1400,auto:5.7,sched:1750,inv:0,mat:6.05},
   {n:"Duck",seg:2,sp:8.0,ss:12.0,sm:23000,sa:1.7, r1:[8.9,10.8,25000,"2028-01-01"],
    price:39.50,promo:1500,sales:1425,fc:500,cap:600,auto:3.0,sched:500,inv:0,mat:15.79},
   {n:"Dot",seg:3,sp:9.4,ss:15.5,sm:25000,sa:2.5, r1:[9.4,14.0,24100,"2027-11-30"],
    price:33.00,promo:1500,sales:1425,fc:420,cap:600,auto:3.0,sched:420,inv:0,mat:14.41},
   {n:"Dune",seg:4,sp:4.0,ss:11.0,sm:19000,sa:2.6, r1:[5.0,11.0,18000,"2027-08-02"],
    price:31.50,promo:1500,sales:1425,fc:400,cap:600,auto:3.0,sched:400,inv:0,mat:12.00}
  ];
  return {round:1, cal:{...DEF_CAL},
    products:P.map(o=>({name:o.n,seg:o.seg,launch:0,added:false,
      sp:o.sp,ss:o.ss,sm:o.sm,sa:o.sa,
      rounds:Array.from({length:NR},(_,r)=>({
        p:r===0?o.r1[0]:o.r1[0], s:r===0?o.r1[1]:o.r1[1], m:r===0?o.r1[2]:o.r1[2],
        date:r===0?o.r1[3]:"",
        price:+(o.price+(r>0?PRICE_DRIFT*(r-1):0)).toFixed(2),
        promo:o.promo, sales:o.sales, fc:o.fc,
        cap:o.cap, auto:o.auto, sched:o.sched, inv:r===1?o.inv:0, mat:o.mat,
        aware:r===1?0.72:0.5, access:r===1?0.68:0.5
      }))})),
    fin:Array.from({length:NR},()=>({stockI:0,stockR:0,bondI:0,bondR:0,div:0,curDebt:0}))};
}

let S=load()||seed(), tab=0;

/* ================= persistence ========================================== */
function save(){ try{localStorage.setItem("digbyCapsim",JSON.stringify(S));}catch(e){} }
function load(){
  const h=location.hash.match(/#d=(.+)$/);
  if(h){ try{ const o=JSON.parse(decodeURIComponent(escape(atob(h[1]))));
    if(o&&o.products) return o; }catch(e){} }
  try{ const t=localStorage.getItem("digbyCapsim"); if(t) return JSON.parse(t); }catch(e){}
  return null;
}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");
  setTimeout(()=>t.classList.remove("on"),1900);}

/* ================= shared model ========================================= */
const DAYMS=864e5;
function revFrac(pi,r){
  const c=S.products[pi].rounds[r]; if(!c.date) return 0;
  const t=Date.parse(c.date+"T00:00:00Z"); if(isNaN(t)) return 0;
  return (t-Date.UTC(YR0+r,0,1))/(365*DAYMS);
}
// age halves ONLY on a position change; MTBF-only revisions age normally
function posChanged(pi,r){
  const P=S.products[pi], c=P.rounds[r];
  const pp = r===0? P.sp : P.rounds[r-1].p;
  const ps = r===0? P.ss : P.rounds[r-1].s;
  return Math.abs(c.p-pp)>1e-9 || Math.abs(c.s-ps)>1e-9;
}
function ages(pi){
  const P=S.products[pi], out=[]; let prev=P.sa;
  for(let r=0;r<NR;r++){
    if(r<P.launch){out.push(null);continue;}
    const f = posChanged(pi,r)? revFrac(pi,r) : 0;
    if(r===P.launch&&P.launch>0){const e=(f>0&&f<1)?1-f:1;out.push(e);prev=e;continue;}
    let e,nx;
    if(f<=0){e=prev+1;nx=e;}
    else if(f<1){e=(prev+f)/2+(1-f);nx=e;}
    else{e=prev+1;nx=(prev+f)/2;}
    out.push(e); prev=nx;
  }
  return out;
}
const laborUnit=(auto,shift)=>{
  const base=Math.max(0,S.cal.laborBase-S.cal.laborSlope*auto);
  return base*(1+S.cal.shiftPremium*(shift||0));
};
const shiftPct=(sched,cap)=>cap>0? Math.max(0,Math.min(1,(sched-cap)/cap)) : 0;
// EST: saturating response curves
const awareGain=b=>S.cal.awareMax*(1-Math.pow(2,-b/S.cal.awareHalf));
const accessGain=b=>S.cal.accessMax*(1-Math.pow(2,-b/S.cal.accessHalf));
function awareness(pi,r){
  const c=S.products[pi].rounds[r];
  const prev = r>0 ? awareness(pi,r-1) : (c.aware||0);
  return Math.min(1, prev*S.cal.awarenessKeep + awareGain(c.promo));
}
function accessibility(pi,r){
  const c=S.products[pi].rounds[r];
  const prev = r>0 ? accessibility(pi,r-1) : (c.access||0);
  return Math.min(1, prev*S.cal.accessKeep + accessGain(c.sales));
}
// EST: customer survey score from the published criteria weights
function survey(pi,r,si){
  const c=S.products[pi].rounds[r], g=SEG[si], id=idealAt(si,r), cen=centreAt(si,r);
  const dCen=dist(c.p,c.s,cen.p,cen.s);
  if(dCen>4) return 0;                                  // outside the rough cut
  const dId=dist(c.p,c.s,id.p,id.s);
  const pos=Math.max(0,1-dId/4);
  const lo=priceLo(si,r), hi=priceHi(si,r);
  const price = c.price<=lo?1 : c.price>=hi?0 : (hi-c.price)/(hi-lo);
  const A=ages(pi)[r]||0;
  const age = Math.max(0,1-Math.abs(A-g.age)/Math.max(1.5,g.age||1.5));
  const mtbf = c.m<g.mlo||c.m>g.mhi ? 0 : 0.5+0.5*((c.m-g.mlo)/(g.mhi-g.mlo));
  const w=g.w;
  return 100*((w.pos||0)*pos+(w.price||0)*price+(w.age||0)*age+(w.mtbf||0)*mtbf);
}
function segDemand(si,r){ return Math.round(SEG[si].u26*Math.pow(1+SEG[si].g,r+1)); }
function unitsFor(pi,r){ const c=S.products[pi].rounds[r]; return c.fc||0; }
function varCost(pi,r){
  const c=S.products[pi].rounds[r];
  return (c.mat||0)+laborUnit(c.auto,shiftPct(c.sched,c.cap));
}
function plantInvest(pi,r){
  const c=S.products[pi].rounds[r];
  const pc = r>0? S.products[pi].rounds[r-1] : c;
  const dCap=Math.max(0,(c.cap||0)-(pc.cap||0));
  const dAut=Math.max(0,(c.auto||0)-(pc.auto||0));
  return dCap*(S.cal.capCost+S.cal.autoCost*(c.auto||0)) + dAut*S.cal.autoCost*(pc.cap||0);
}
function pnl(r){
  let rev=0,vc=0,fixed=0,inv=0;
  S.products.forEach((P,i)=>{
    if(r<P.launch) return;
    const c=P.rounds[r], u=unitsFor(i,r);
    rev+=u*c.price; vc+=u*varCost(i,r);
    fixed+=(c.promo||0)+(c.sales||0)+((c.cap||0)*(S.cal.capCost+S.cal.autoCost*(c.auto||0)))/S.cal.depYears;
    inv+=plantInvest(i,r);
  });
  const cm=rev-vc, ebit=cm-fixed;
  const f=S.fin[r]||{};
  const interest=((f.curDebt||0)*S.cal.interestST)+0;
  const pre=ebit-interest, tax=Math.max(0,pre)*S.cal.taxRate, net=pre-tax;
  return {rev,vc,cm,fixed,ebit,interest,pre,tax,net,inv,
          cmPct:rev>0?cm/rev:0, ros:rev>0?net/rev:0};
}
const money=v=>(v<0?"($"+Math.abs(Math.round(v)).toLocaleString()+")":"$"+Math.round(v).toLocaleString());
const pct=v=>(100*v).toFixed(1)+"%";
const EST='<span class="estmark" title="Estimated — calibrate on the Calibration tab">&bull;</span>';

/* ================= perceptual map ======================================= */
const M=52,W=560,IN=W-M*2;
const X=v=>M+(v/20)*IN, Y=v=>M+(1-v/20)*IN, RR=u=>(u/20)*IN;
function mapSVG(r,opt){
  let g=`<defs><radialGradient id="sg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#9fc5e8" stop-opacity=".92"/>
    <stop offset="62%" stop-color="#7fb1de" stop-opacity=".8"/>
    <stop offset="100%" stop-color="#5b9bd5" stop-opacity=".55"/></radialGradient></defs>
    <rect x="${M}" y="${M}" width="${IN}" height="${IN}" fill="#fff" stroke="#9aa7b5"/>`;
  for(let v=0;v<=20;v+=2){
    g+=`<line x1="${X(v)}" y1="${M}" x2="${X(v)}" y2="${M+IN}" stroke="#d7dee6"/>
        <line x1="${M}" y1="${Y(v)}" x2="${M+IN}" y2="${Y(v)}" stroke="#d7dee6"/>
        <text x="${X(v)}" y="${M+IN+16}" font-size="10" fill="#94a3b8" text-anchor="middle">${v}</text>
        <text x="${M-9}" y="${Y(v)+3}" font-size="10" fill="#94a3b8" text-anchor="end">${v}</text>`;
  }
  g+=`<text x="${M+IN/2}" y="${M+IN+36}" font-size="11" fill="#64748b" text-anchor="middle">Performance</text>
      <text x="16" y="${M+IN/2}" font-size="11" fill="#64748b" text-anchor="middle"
       transform="rotate(-90 16 ${M+IN/2})">Size</text>`;
  if(opt.corridor){
    g+=`<line x1="${X(0)}" y1="${Y(20)}" x2="${X(20)}" y2="${Y(0)}" stroke="#0f172a"
         stroke-width="1.6" stroke-dasharray="7 5" opacity=".55"/>`;
    zones(r).forEach(z=>{
      if(z.rough) g+=`<line x1="${X(z.rough[0])}" y1="${Y(20-z.rough[0])}"
        x2="${X(z.rough[1])}" y2="${Y(20-z.rough[1])}" stroke="#f59e0b" stroke-width="9"
        opacity=".33" stroke-linecap="round"/>`;
      if(z.fine) g+=`<line x1="${X(z.fine[0])}" y1="${Y(20-z.fine[0])}"
        x2="${X(z.fine[1])}" y2="${Y(20-z.fine[1])}" stroke="#16a34a" stroke-width="9"
        opacity=".75" stroke-linecap="round"/>`;
    });
  }
  SEG.forEach((s,i)=>{
    if(opt.trails){let pts=[];for(let k=0;k<NR;k++){const q=centreAt(i,k);pts.push(`${X(q.p)},${Y(q.s)}`);}
      g+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${s.c}" stroke-width="1"
           stroke-dasharray="3 3" opacity=".45"/>`;}
    const q=centreAt(i,r);
    g+=`<circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RR(4)}" fill="none" stroke="#7a7a7a" stroke-width="1.1"/>
        <circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RR(2.5)}" fill="url(#sg)" stroke="#5b9bd5"/>
        <circle cx="${X(q.p)}" cy="${Y(q.s)}" r="3.2" fill="#111"/>`;
  });
  SEG.forEach((s,i)=>{
    const q=centreAt(i,r), d=idealAt(i,r);
    if(s.ox||s.oy) g+=`<line x1="${X(q.p)}" y1="${Y(q.s)}" x2="${X(d.p)}" y2="${Y(d.s)}"
      stroke="${s.c}" stroke-width="1" opacity=".7"/>`;
    g+=`<path d="M${X(d.p)-4.5},${Y(d.s)} h9 M${X(d.p)},${Y(d.s)-4.5} v9" stroke="${s.c}"
         stroke-width="2" stroke-linecap="round"/>
        <text x="${X(q.p)}" y="${Y(q.s)-RR(2.5)-6}" font-size="10.5" font-weight="700" fill="${s.c}"
         text-anchor="middle" paint-order="stroke" stroke="#fff" stroke-width="3"
         stroke-linejoin="round">${s.n}</text>`;
  });
  S.products.forEach((P,i)=>{
    if(r<P.launch) return;
    const c=P.rounds[r];
    g+=`<rect x="${X(c.p)-4.2}" y="${Y(c.s)-4.2}" width="8.4" height="8.4"
         fill="${P.added?"#fff":"#111"}" stroke="#111" stroke-width="1.6"/>
        <text x="${X(c.p)+8}" y="${Y(c.s)+4}" font-size="11" font-weight="700" fill="#111"
         paint-order="stroke" stroke="#fff" stroke-width="3" stroke-linejoin="round">${P.name}</text>`;
  });
  return `<svg viewBox="0 0 560 560" width="100%">${g}</svg>`;
}
const RT2=Math.SQRT2, RF=2.5/RT2, RGH=4/RT2;
function zones(r){
  const P=i=>SEG[i].cp+SEG[i].dp*r;
  const pair=(a,b)=>{const lo=P(a),hi=P(b),gap=(hi-lo)*RT2;
    const rl=hi-RGH,rh=lo+RGH,fl=hi-RF,fh=lo+RF,mid=(lo+hi)/2;
    return {a:SEG[a].n,b:SEG[b].n,gap,rough:rh>rl?[rl,rh]:null,fine:fh>fl?[fl,fh]:null,
            mid,midS:20-mid,md:gap/2};};
  return [pair(1,0),pair(0,2)];
}

/* ================= render / events ====================================== */
const O={corridor:true,trails:false};
function render(){
  const rb=document.getElementById("rounds");
  rb.innerHTML=Array.from({length:NR},(_,r)=>
    `<button data-r="${r}" class="${r===S.round?'on':''}">${R(r)}</button>`).join("");
  document.getElementById("tabs").innerHTML=TABS.map((t,i)=>
    `<button data-t="${i}" class="${i===tab?'on':''}">${t}</button>`).join("");
  const r=S.round;
  document.getElementById("body").innerHTML=
    tab===0?tRD(r):tab===1?tMkt(r):tab===2?tProd(r):tab===3?tFin(r):tab===4?tScore():tCal();
  wire(); save();
}
function wire(){
  document.querySelectorAll("#rounds button").forEach(b=>
    b.onclick=()=>{S.round=+b.dataset.r;render();});
  document.querySelectorAll("#tabs button").forEach(b=>
    b.onclick=()=>{tab=+b.dataset.t;render();});
  const cc=document.getElementById("ccor"), ct=document.getElementById("ctra");
  if(cc) cc.onchange=()=>{O.corridor=cc.checked;render();};
  if(ct) ct.onchange=()=>{O.trails=ct.checked;render();};
  const ap=document.getElementById("addP");
  if(ap) ap.onclick=()=>{
    const q=idealAt(2,S.round);
    S.products.push({name:"New "+(S.products.length-4),seg:2,launch:S.round,added:true,
      sp:q.p,ss:q.s,sm:20000,sa:0,
      rounds:Array.from({length:NR},()=>({p:q.p,s:q.s,m:20000,date:"",price:35,promo:1000,
        sales:1000,fc:0,cap:400,auto:3,sched:0,inv:0,mat:14,aware:0,access:0}))});
    render();};
  document.querySelectorAll("[data-p]").forEach(el=>el.addEventListener("change",e=>{
    const i=+e.target.dataset.p, f=e.target.dataset.f, r=S.round;
    if(f==="date"){ S.products[i].rounds[r].date=e.target.value; }
    else{ let v=parseFloat(e.target.value); if(isNaN(v)) v=0;
      const carry=["p","s","m","cap","auto","mat"];
      if(carry.includes(f)) for(let k=r;k<NR;k++) S.products[i].rounds[k][f]=v;
      else S.products[i].rounds[r][f]=v; }
    render();}));
  document.querySelectorAll("[data-fin]").forEach(el=>el.addEventListener("change",e=>{
    let v=parseFloat(e.target.value); if(isNaN(v)) v=0;
    S.fin[S.round][e.target.dataset.fin]=v; render();}));
  document.querySelectorAll("[data-cal]").forEach(el=>el.addEventListener("change",e=>{
    let v=parseFloat(e.target.value); if(isNaN(v)) v=0;
    S.cal[e.target.dataset.cal]=v; render();}));
}
document.getElementById("bSave").onclick=()=>{
  const b=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b);
  a.download="digby-capsim-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  toast("Saved — put it in the shared Drive folder");};
document.getElementById("bLoad").onclick=()=>document.getElementById("fIn").click();
document.getElementById("fIn").onchange=e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{try{const o=JSON.parse(rd.result); if(!o.products) throw 0;
    S=o; if(!S.cal) S.cal={...DEF_CAL}; render(); toast("Loaded");}
    catch(x){toast("That file could not be read");}}; rd.readAsText(f);};
document.getElementById("bLink").onclick=()=>{
  const d=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
  const u=location.origin+location.pathname+"#d="+d;
  navigator.clipboard.writeText(u).then(()=>toast("Share link copied ("+Math.round(u.length/1024)+" KB)"),
    ()=>{prompt("Copy this link:",u);});};
document.getElementById("bReset").onclick=()=>{
  if(confirm("Reset every round back to the seeded Round 1 and 2 board?")){
    S=seed(); localStorage.removeItem("digbyCapsim"); location.hash=""; render(); toast("Reset");}};
render();
</script>
</body>
</html>
