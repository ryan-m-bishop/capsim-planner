<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Digby Capsim Planner</title>
<style>
:root{--ink:#16202c;--mut:#64748b;--line:#dde4ec;--bg:#f5f7fa;--card:#fff;--nav:#1f3864;
 --acc:#2563eb;--good:#166534;--goodbg:#dcfce7;--warn:#92400e;--warnbg:#fef3c7;
 --bad:#991b1b;--badbg:#fee2e2;--est:#7c3aed;--bub:#f6c344;--new:#5b9bd5;--old:#3f4550}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
 font:14px/1.55 "Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
header{background:var(--nav);color:#fff;padding:11px 20px;display:flex;align-items:center;
 gap:14px;flex-wrap:wrap}
header h1{margin:0;font-size:16px;font-weight:600}
header .sp{flex:1}
header button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);
 padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
header button:hover{background:rgba(255,255,255,.26)}
.rounds{display:flex;gap:5px;padding:10px 20px 0;flex-wrap:wrap}
.rounds button{border:1px solid var(--line);background:var(--card);padding:6px 13px;
 border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut)}
.rounds button.on{background:var(--nav);color:#fff;border-color:var(--nav)}
nav{display:flex;gap:4px;padding:10px 20px 0;flex-wrap:wrap;border-bottom:2px solid var(--line)}
nav button{border:1px solid var(--line);border-bottom:none;background:#eef2f7;padding:8px 16px;
 border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut)}
nav button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 0 0 var(--card)}
.wrap{padding:16px 20px 70px;max-width:1560px}
.card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:14px 17px;
 margin-bottom:15px}
.card h2{margin:0 0 3px;font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.card p.sub{margin:0 0 9px;font-size:12px;color:var(--mut)}
.row{display:flex;gap:15px;align-items:flex-start;flex-wrap:wrap}
.col{flex:1;min-width:330px}
.col.narrow{max-width:600px}
/* product sub-tabs, styled like the sim */
.ptabs{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:14px}
.ptabs button{flex:1;border:none;border-right:1px solid var(--line);background:#eceff3;
 padding:9px 6px;cursor:pointer;font-size:13px;font-weight:650;color:var(--mut)}
.ptabs button:last-child{border-right:none}
.ptabs button.on{background:var(--card);color:var(--ink);box-shadow:inset 0 -3px 0 0 var(--acc)}
/* slider block */
.sld{display:grid;grid-template-columns:118px 1fr;gap:10px;align-items:center;
 padding:15px 0 13px;border-bottom:1px solid var(--line)}
.sld:last-child{border-bottom:none}
.sld .lab{font-size:12.5px;font-weight:650}
.sld .lab small{display:block;font-weight:400;color:var(--mut);font-size:10.5px}
.track{display:flex;align-items:center;gap:9px}
.track .mm{font-size:10.5px;color:var(--mut);min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
/* slider with target band + tick overlays */
.tw{position:relative;flex:1;height:20px;display:flex;align-items:center}
.tw .base{position:absolute;left:0;right:0;height:6px;border-radius:4px;background:#d6dde5}
.tw .band{position:absolute;height:6px;border-radius:3px;pointer-events:none}
.tw .tick{position:absolute;width:2px;height:16px;pointer-events:none;border-radius:1px}
.tw .tlab{position:absolute;font-size:8.5px;font-weight:700;pointer-events:none;
 white-space:nowrap;background:#fff;padding:0 3px;border-radius:3px;line-height:11px}
.tw input[type=range]{position:relative;z-index:2;width:100%;background:transparent}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:4px;
 background:#d6dde5;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;
 border-radius:50%;background:#fff;border:2px solid #9aa7b5;cursor:pointer}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;
 border:2px solid #9aa7b5;cursor:pointer}
.bub{width:74px;padding:3px 4px;border:1px solid #d9b93c;border-radius:5px;background:var(--bub);
 font:inherit;font-size:12.5px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.bub:focus{outline:2px solid var(--acc);outline-offset:-1px}
input[type=date]{padding:4px 6px;border:1px solid var(--line);border-radius:5px;font:inherit;
 font-size:12.5px;background:#fffbe6;width:140px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center}
th{background:#f2f6fa;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
 color:var(--mut);font-weight:700}
td.l,th.l{text-align:left}
td.name{text-align:left;font-weight:650}
tr.tot td{font-weight:700;background:#f7f9fc;border-top:2px solid var(--nav)}
tr.hi td{background:#eef4fc}
.num{font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:700}
.yes{background:var(--goodbg);color:var(--good)}
.rough{background:var(--warnbg);color:var(--warn)}
.no{background:var(--badbg);color:var(--bad)}
.legend{display:flex;gap:13px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--mut)}
.legend span{display:flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.bar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer}
.btn{border:1px solid var(--line);background:var(--card);padding:5px 12px;border-radius:6px;
 cursor:pointer;font-size:12px;font-weight:600;color:var(--mut)}
.btn:hover{background:#f2f6fa}
.note{font-size:11.5px;color:var(--mut);margin-top:10px;line-height:1.6}
.note b{color:var(--warn)}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;margin-bottom:14px}
.kpi div{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}
.kpi b{display:block;font-size:18px;font-weight:700;letter-spacing:-.4px}
.kpi span{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
.flag{padding:7px 12px;border-radius:6px;margin:5px 0;font-size:12.5px;font-weight:600}
.flag.w{background:var(--warnbg);color:var(--warn)}
.flag.e{background:var(--badbg);color:var(--bad)}
.flag.o{background:var(--goodbg);color:var(--good)}
.estmark{color:var(--est);font-weight:700;cursor:help}
.chip{display:inline-block;padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;
 margin-left:5px;vertical-align:middle}
.chip.up{background:var(--goodbg);color:var(--good)}
.chip.down{background:var(--badbg);color:var(--bad)}
.chip.flat{background:#eef2f7;color:var(--mut)}
.hide{display:none}
/* keep charts compact — they scale to the column otherwise */
.card svg{display:block;max-width:330px;margin:0 auto}
.card.map svg{max-width:470px}
/* product rename */
.ptabs input.pname{flex:1;border:none;border-right:1px solid var(--line);background:#fffbe6;
 padding:9px 6px;font:inherit;font-size:13px;font-weight:650;color:var(--ink);text-align:center;
 outline:2px solid var(--acc);outline-offset:-2px;min-width:0}
.ptabs button.ren{flex:0 0 34px;font-size:12px}
/* map zoom */
.zbar{display:flex;align-items:center;gap:4px}
.zbar button{border:1px solid var(--line);background:var(--card);width:26px;height:24px;
 border-radius:5px;cursor:pointer;font-size:14px;font-weight:700;color:var(--mut);line-height:1;
 padding:0;display:flex;align-items:center;justify-content:center}
.zbar button:hover{background:#f2f6fa;color:var(--ink)}
.zbar button.wide{width:auto;padding:0 8px;font-size:11px;font-weight:600}
.zbar .lvl{font-size:11px;color:var(--mut);min-width:34px;text-align:center;
 font-variant-numeric:tabular-nums}
svg[data-map]{touch-action:none}
/* map popout */
.mbk{position:fixed;inset:0;background:rgba(15,23,42,.62);display:flex;align-items:center;
 justify-content:center;z-index:200;padding:18px}
.mbox{background:var(--card);border-radius:12px;padding:13px 18px 16px;width:100%;
 max-width:min(96vw,1120px);max-height:96vh;display:flex;flex-direction:column;
 box-shadow:0 22px 60px rgba(0,0,0,.38)}
.mhd{display:flex;align-items:center;gap:13px;flex-wrap:wrap;margin-bottom:9px}
.mhd b{font-size:15px}
.mhd .sp{flex:1}
.mbd{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:auto}
.mbd svg{max-width:none;width:auto;height:min(76vh,880px);max-height:100%}
@media (max-width:820px){.mbd svg{width:100%;height:auto}}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--nav);
 color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;
 transition:opacity .25s;pointer-events:none;z-index:99}
#toast.on{opacity:1}
</style>
</head>
<body>

<header>
  <h1>Digby Capsim Planner</h1>
  <span style="font-size:12px;opacity:.75">CP135726_1 &middot; Cost Leader / Product Lifecycle Focus</span>
  <span class="sp"></span>
  <button id="bSave">Save file</button>
  <button id="bLoad">Load file</button>
  <button id="bLink">Copy share link</button>
  <button id="bReset">Reset</button>
  <input type="file" id="fIn" accept=".json" class="hide">
</header>

<div class="rounds" id="rounds"></div>
<nav id="tabs"></nav>
<div class="wrap" id="body"></div>
<div id="modal"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   DIGBY CAPSIM PLANNER — single file, no backend.

   MODEL HONESTY
     EXACT  positions, drift, age, corridor/overlap geometry, revenue, variable
            cost, contribution margin, utilisation, plant investment, P&L.
     EST    marked with a purple dot: awareness, accessibility, customer survey
            score, future segment demand. Editable on the Calibration tab.
     ABSENT material cost and R&D project cost/duration (formulas would not
            reproduce); balance sheet, equity, share count.
   ========================================================================== */
const NR=8, YR0=2027;
const R=r=>`R${r+1} · ${YR0+r}`;

const SEG=[
 {n:"Traditional",cp:5.7,cs:14.3,ox:0,oy:0,dp:.7,ds:-.7,age:2.0,mlo:14000,mhi:19000,
  plo:19.5,phi:29.5,w:{age:.47,price:.23,pos:.21,mtbf:.09},c:"#2563eb",u26:6156,g:.092},
 {n:"Low End",cp:3.0,cs:17.0,ox:-.8,oy:.8,dp:.5,ds:-.5,age:7.0,mlo:12000,mhi:17000,
  plo:14.5,phi:24.5,w:{price:.53,age:.24,pos:.16,mtbf:.07},c:"#059669",u26:7467,g:.117},
 {n:"High End",cp:8.4,cs:11.6,ox:1.4,oy:-1.4,dp:.9,ds:-.9,age:0,mlo:20000,mhi:25000,
  plo:29.5,phi:39.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#dc2626",u26:2128,g:.162},
 {n:"Performance",cp:9.0,cs:16.3,ox:1.4,oy:-1.0,dp:1.0,ds:-.7,age:1.0,mlo:22000,mhi:27000,
  plo:24.5,phi:34.5,w:{mtbf:.43,pos:.29,price:.19,age:.09},c:"#d97706",u26:1596,g:.198},
 {n:"Size",cp:3.7,cs:11.0,ox:1.0,oy:-1.4,dp:.7,ds:-1.0,age:1.5,mlo:16000,mhi:21000,
  plo:24.5,phi:34.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#7c3aed",u26:1653,g:.183}
];
const PD=-0.50;
const centreAt=(i,r)=>({p:+(SEG[i].cp+SEG[i].dp*r).toFixed(2),s:+(SEG[i].cs+SEG[i].ds*r).toFixed(2)});
const idealAt=(i,r)=>{const c=centreAt(i,r);return{p:+(c.p+SEG[i].ox).toFixed(2),s:+(c.s+SEG[i].oy).toFixed(2)};};
const priceLo=(i,r)=>SEG[i].plo+PD*r, priceHi=(i,r)=>SEG[i].phi+PD*r;
const dist=(a,b,c,d)=>Math.hypot(a-c,b-d);

/* Labour is not one number. Capsim raises the wage every year, so the same
   automation costs more each round: $8.97 at automation 3.0 in R1, $9.19 in R2,
   $9.93 in R3. `wage` holds the observed figure per round — read it straight off
   the Production screen from any product sitting at automation 3.0 — and future
   rounds are projected forward at `wageInfl`. `autoSave` is the share of the
   wage each automation point removes, which has held at 0.125 all three rounds.
   `prodAdj` is how far actual production falls short of the order; it only
   affects the second-shift blend. */
const DEF_CAL={wage:[8.97,9.19,9.07],wageInfl:.05,autoSave:.125,prodAdj:.025,
 shiftPremium:.5,capCost:6,autoCost:4,
 awarenessKeep:.667,accessKeep:.667,awareMax:.87,awareHalf:1400,accessMax:.85,accessHalf:1700,
 taxRate:.35,depYears:15,adminRate:.00889,profitShareRate:.02,interestLT:.134,interestST:.1025,stockFee:.05,bondFee:.015};
/* Opening balances, derived from the Round 0 Courier's Selected Financial Statistics:
   assets = sales / asset turnover = 101,073 / 1.05 = 96,260
   equity = assets / leverage      = 96,260 / 2.01  = 47,891
   Long-term debt, cash, shares and price are placeholders — correct them from
   your Balance Sheet on the Finance screen. */
const DEF_OPEN={assets:96260,equity:47891,ltDebt:34750,cash:3431,shares:2000,price:34.00};

/* ---------------- seed: actual Digby history ----------------------------
   Every value below was read off the Capsim platform, not estimated:
     R1 (2027) and R2 (2028) from the Courier — Plant Information for positions,
       MTBF, revision dates, ages, inventory, material cost; the segment analysis
       pages for awareness and accessibility; the board packet for the decisions.
     R3 (2029) from the live R&D, Marketing and Production screens on 21 Jul 2026.
   Rounds 4-8 start as a copy of R3 and are yours to plan.
   Each product: rd = [pfmn, size, MTBF, revision date] per round
                 mk = [price, promo, sales budget, forecast] per round
                 pd = [production order, capacity, automation] per round
   Round index 0 = R1/2027.                                                 */
function seed(){
 const P=[
  {n:"Daze",seg:0,sp:5.5,ss:14.5,sm:17500,sa:3.1,sau:4.0,m0:11.59,
   rd:[[5.7,14.3,14000,"2027-05-09"],[5.7,14.3,14000,""],[5.7,14.3,14000,""]],
   mk:[[26.50,1500,1600,1360],[24.50,1700,2000,1250],[23.50,1350,2000,790]],
   pd:[[1380,1800,4.5],[1200,1700,4.5],[1284,1700,5.0]],
   rdc:[0,0,0], mat:[9.80,8.95,8.18], inv:[0,404,338], aw:[.728,.890,.917], ac:[.61,.72,.80]},

  {n:"Dell",seg:1,sp:3.0,ss:17.0,sm:14000,sa:4.6,sau:5.0,m0:7.81,
   rd:[[3.0,17.0,12000,"2027-01-30"],[3.0,17.0,12000,""],[3.0,17.0,12000,""]],
   mk:[[19.50,1500,1300,1750],[19.50,1900,1700,2000],[18.75,1300,1700,2469]],
   pd:[[1770,1400,5.5],[2100,1400,5.5],[2470,1400,5.5]],
   rdc:[0,0,0], mat:[6.45,5.78,5.19], inv:[0,0,0], aw:[.706,.909,.915], ac:[.40,.54,.73]},

  {n:"Duck",seg:2,sp:8.0,ss:12.0,sm:23000,sa:1.7,sau:3.0,m0:15.98,
   rd:[[8.9,10.8,25000,"2027-12-16"],[10.3,9.9,25000,"2028-11-10"],[11.6,8.4,25000,"2029-12-20"]],
   mk:[[39.50,1600,1600,500],[39.00,1700,1700,480],[38.50,1700,1700,791]],
   pd:[[510,800,3.0],[420,800,3.0],[791,800,3.0]],
   rdc:[0,860,967], mat:[16.52,16.52,16.70], inv:[0,128,0], aw:[.707,.876,.990], ac:[.54,.64,.76]},

  {n:"Dot",seg:2,sp:9.4,ss:15.5,sm:25000,sa:2.5,sau:3.0,m0:15.87,
   rd:[[9.4,14.0,24100,"2027-11-30"],[9.4,13.0,24100,"2028-06-23"],[9.4,11.7,21000,"2029-09-15"]],
   mk:[[33.00,1500,1400,420],[31.75,800,800,400],[31.50,1200,1150,543]],
   pd:[[430,600,3.0],[300,600,3.0],[543,600,3.0]],
   rdc:[0,476,707], mat:[15.06,14.44,13.09], inv:[0,103,0], aw:[.664,.596,.676], ac:[.39,.64,.80]},

  {n:"Dune",seg:4,sp:4.0,ss:11.0,sm:19000,sa:2.6,sau:3.0,m0:13.62,
   rd:[[5.0,11.0,18000,"2027-08-02"],[5.0,9.5,18000,"2028-10-07"],[5.6,8.1,18000,"2029-09-22"]],
   mk:[[31.50,1400,1400,400],[31.00,1600,1600,530],[31.50,1400,1600,446]],
   pd:[[410,600,3.0],[600,600,3.0],[711,700,3.0]],
   rdc:[0,765,724], mat:[12.62,12.58,12.64], inv:[0,1,3], aw:[.639,.810,.877], ac:[.46,.49,.52]},

  {n:"Dino",seg:3,launch:2,sp:13.5,ss:13.5,sm:27000,sa:0,sau:2.0,m0:16.82,
   rd:[[13.5,13.5,27000,""],[13.5,13.5,27000,""],[13.5,13.5,27000,"2029-09-24"]],
   mk:[[18.50,0,0,0],[18.50,0,0,0],[34.75,0,500,57]],
   pd:[[0,0,2.0],[0,200,2.0],[107,400,2.0]],
   rdc:[0,1000,729], mat:[16.82,16.82,16.48], inv:[0,0,0], aw:[0,0,.25], ac:[0,0,.36]}];

 const at=(a,r)=>a[Math.min(r,a.length-1)];
 const st={round:3,cal:{...DEF_CAL},open:{...DEF_OPEN},
  products:P.map(o=>({name:o.n,key:o.n,seg:o.seg,launch:o.launch||0,added:false,
   sp:o.sp,ss:o.ss,sm:o.sm,sa:o.sa,sau:o.sau,m0:o.m0,
   rounds:Array.from({length:NR},(_,r)=>{
    const d=at(o.rd,r), m=at(o.mk,r), p=at(o.pd,r);
    return {p:d[0],s:d[1],m:d[2],date:r<o.rd.length?d[3]:"",
     price:m[0],promo:m[1],sales:m[2],fc:m[3],
     sched:p[0],cap:p[1],auto:p[2],
     inv:at(o.inv,r), mat:at(o.mat,r), rdc:at(o.rdc,r), aware:at(o.aw,r), access:at(o.ac,r)};})})),
  /* Financing was untouched in R1-R3. The extra fields anchor each round to the
     Courier so the cash flow and income statement reconcile with the sim:
       cashStart  actual opening cash (R1 3,431 / R2 752 / R3 13,745)
       curDebtDue scheduled current-debt maturity that round (R3 6,950)
       wcChange   working-capital swing = op cash - net - depreciation
       invCarry   inventory carrying cost from the proforma
       otherFees  the non-HR part of Capsim's "Other" line */
  fin:Array.from({length:NR},(_,r)=>({stockI:0,stockR:0,bondI:0,bondR:0,div:0,curDebt:0,
    cashStart:[3431,752,13745,0][r]!=null?[3431,752,13745,0][r]:null,
    curDebtDue:[0,0,6950,6208][r]!=null?[0,0,6950,6208][r]:0,
    wcChange:[-5076,5796,-13285][r]!=null?[-5076,5796,-13285][r]:0,
    invCarry:[0,1190,3190][r]!=null?[0,1190,3190][r]:0,
    otherFees:[30,0,0][r]!=null?[30,0,0][r]:0}))};
 /* the sim's committed decisions are the baseline everything is measured against */
 /* Human Resources is a company-level spend, not per product. R1 the module was
    inactive; R2 the team put in $3,600; R3 defaults to the recommended $4,500. */
 st.hr=[{mfg:0,sci:0,sales:0},{mfg:1000,sci:2000,sales:600},{mfg:1400,sci:1500,sales:800}];
 while(st.hr.length<NR) st.hr.push({mfg:0,sci:0,sales:0});
 st.base=JSON.parse(JSON.stringify({products:st.products,fin:st.fin,hr:st.hr}));
 return st;}

let S=load()||seed(), tab=0, sel=0;
if(!S.open) S.open={...DEF_OPEN};
if(!S.base) S.base=JSON.parse(JSON.stringify({products:S.products,fin:S.fin,hr:S.hr}));
if(!S.hr) S.hr=Array.from({length:NR},()=>({mfg:0,sci:0,sales:0}));
while(S.hr.length<NR) S.hr.push({mfg:0,sci:0,sales:0});
S.cal={...DEF_CAL,...(S.cal||{})};
const O={corridor:true,trails:false,comp:false,complab:false,pop:false};

function save(){try{localStorage.setItem("digbyCapsim",JSON.stringify(S));}catch(e){}}
function load(){
 const h=location.hash.match(/#d=(.+)$/);
 if(h){try{const o=JSON.parse(decodeURIComponent(escape(atob(h[1]))));if(o&&o.products)return o;}catch(e){}}
 try{const t=localStorage.getItem("digbyCapsim");if(t)return JSON.parse(t);}catch(e){}
 return null;}
/* Local date and time, sortable, safe in a filename. Several saves a day is
   normal, so the date alone was overwriting. */

 return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;}

/* Most recent observed snapshot at or before round r. */
function compAt(r){
 const ks=Object.keys(COMP).map(Number).filter(k=>k<=r).sort((a,b)=>b-a);
 if(!ks.length) return null;
 return {from:ks[0],stale:ks[0]!==r,list:COMP[ks[0]]};}
const coOf=k=>CO.find(x=>x.k===k);

/* ---------------- model (validated against the live board) --------------- */
const DAYMS=864e5;
function revFrac(pi,r){const c=S.products[pi].rounds[r];if(!c.date)return 0;
 const t=Date.parse(c.date+"T00:00:00Z");if(isNaN(t))return 0;
 return (t-Date.UTC(YR0+r,0,1))/(365*DAYMS);}
function posChanged(pi,r){const P=S.products[pi],c=P.rounds[r];
 const pp=r===0?P.sp:P.rounds[r-1].p, ps=r===0?P.ss:P.rounds[r-1].s;
 return Math.abs(c.p-pp)>1e-9||Math.abs(c.s-ps)>1e-9;}
function ageInfo(pi){
 const P=S.products[pi],end=[],start=[];let prev=P.sa;
 for(let r=0;r<NR;r++){
  if(r<P.launch){end.push(null);start.push(null);continue;}
  start.push(prev);
  // a launch is always a positioning event, so use its revision date directly
  const f=(r===P.launch&&P.launch>0)?revFrac(pi,r):(posChanged(pi,r)?revFrac(pi,r):0);
  if(r===P.launch&&P.launch>0){const e=(f>0&&f<1)?1-f:1;end.push(e);prev=e;continue;}
  let e,nx;
  if(f<=0){e=prev+1;nx=e;}else if(f<1){e=(prev+f)/2+(1-f);nx=e;}else{e=prev+1;nx=(prev+f)/2;}
  end.push(e);prev=nx;}
 return {end,start};}
const ages=pi=>ageInfo(pi).end;
/* Automation ordered in a round is installed for the NEXT one, so the level a
   product actually runs at is the previous round's decision. Verified against
   R1: Daze was bought up to 4.5 but produced at 4.0 all year, and its labour
   cost says so. */
function opAuto(pi,r){
 const P=S.products[pi];
 if(r<=P.launch) return P.sau!=null?P.sau:(P.rounds[r]?P.rounds[r].auto:3);
 return P.rounds[r-1].auto;}
/* Capacity, like automation, is available the NEXT year — plant bought this round
   comes online next round. So production in round r runs against the capacity the
   product carried INTO the round (the prior round's decision). Verified on Dune R3:
   it ran ~20% second shift against R2's 600 capacity, not the 700 it bought for R4. */
function opCap(pi,r){
 const P=S.products[pi];
 if(r<=P.launch) return P.rounds[r]?P.rounds[r].cap:0;
 return P.rounds[r-1].cap;}
/* Wage at automation 3.0 for round r, observed where we have it, projected after. */
function wageAt(r){
 const w=S.cal.wage||[];
 if(w[r]!=null) return w[r];
 const last=w.length-1;
 return last<0?9.93:w[last]*Math.pow(1+(S.cal.wageInfl||0),r-last);}
/* Second shift is a blend, not a flat surcharge: only the units above capacity
   pay the premium, so it is diluted across the whole run. */
function shiftBlend(sc,cap,r){
 const prod=(sc||0)*(1-(S.cal.prodAdj||0));
 if(prod<=0||cap<=0) return 1;
 const second=Math.max(0,prod-cap);
 return 1+(S.cal.shiftPremium||0)*second/prod;}
function laborUnit(a,sc,cap,r){
 return Math.max(0,wageAt(r)*(1-(S.cal.autoSave||0)*((a||0)-3)))*shiftBlend(sc,cap,r);}
const shiftPct=(sc,cap)=>cap>0?Math.max(0,Math.min(1,(sc-cap)/cap)):0;
const awareGain=b=>S.cal.awareMax*(1-Math.pow(2,-b/S.cal.awareHalf));
const accessGain=b=>S.cal.accessMax*(1-Math.pow(2,-b/S.cal.accessHalf));
function awareness(pi,r){const c=S.products[pi].rounds[r];
 const prev=r>0?awareness(pi,r-1):(c.aware||0);
 return Math.min(1,prev*S.cal.awarenessKeep+awareGain(c.promo));}
function accessibility(pi,r){const c=S.products[pi].rounds[r];
 const prev=r>0?accessibility(pi,r-1):(c.access||0);
 return Math.min(1,prev*S.cal.accessKeep+accessGain(c.sales));}
function survey(pi,r,si){
 const c=S.products[pi].rounds[r],g=SEG[si],id=idealAt(si,r),cen=centreAt(si,r);
 if(dist(c.p,c.s,cen.p,cen.s)>4)return 0;
 const pos=Math.max(0,1-dist(c.p,c.s,id.p,id.s)/4);
 const lo=priceLo(si,r),hi=priceHi(si,r);
 const price=c.price<=lo?1:c.price>=hi?0:(hi-c.price)/(hi-lo);
 const A=ages(pi)[r]||0;
 const age=Math.max(0,1-Math.abs(A-g.age)/Math.max(1.5,g.age||1.5));
 const mt=c.m<g.mlo||c.m>g.mhi?0:.5+.5*((c.m-g.mlo)/(g.mhi-g.mlo));
 const w=g.w;
 return 100*((w.pos||0)*pos+(w.price||0)*price+(w.age||0)*age+(w.mtbf||0)*mt);}
/* Actual segment market sizes 2027/2028/2029 (R1/R2/R3), read from the Courier.
   Known rounds are exact; later rounds project from the last actual at the
   latest observed growth rate. */
const SEGSIZE=[[6765,7313,8016],[8408,9316,10406],[2488,2866,3339],[1930,2292,2744],[1967,2307,2737]];
const segDemand=(si,r)=>{const a=SEGSIZE[si];
 if(r<a.length) return a[r];
 return Math.round(a[a.length-1]*Math.pow(1+SEG[si].g,r-a.length+1));};
const units=(pi,r)=>S.products[pi].rounds[r].fc||0;
const varCost=(pi,r)=>{const c=S.products[pi].rounds[r];
 return (c.mat||0)+laborUnit(opAuto(pi,r),c.sched,opCap(pi,r),r);};
function plantInvest(pi,r){const c=S.products[pi].rounds[r],pc=r>0?S.products[pi].rounds[r-1]:c;
 return Math.max(0,(c.cap||0)-(pc.cap||0))*(S.cal.capCost+S.cal.autoCost*(c.auto||0))
      + Math.max(0,(c.auto||0)-(pc.auto||0))*S.cal.autoCost*(pc.cap||0);}
/* Balance sheet is carried forward round by round from the opening balances you
   enter, so every financing slider moves something: bonds change interest and
   leverage, stock changes equity and share count, dividends drain equity.
   Assets are approximated as equity + long-term debt + current debt. */
function balances(){
 const o=S.open,out=[];
 let eq=o.equity, lt=o.ltDebt, sh=o.shares;
 for(let r=0;r<NR;r++){
  const f=S.fin[r]||{};
  lt = lt + (f.bondI||0) - (f.bondR||0);
  const shNew = o.price>0 ? ((f.stockI||0)-(f.stockR||0))/o.price : 0;
  sh = Math.max(1, sh + shNew);
  const p = pnlRaw(r, lt, f);
  const divTot = (f.div||0)*sh;
  eq = eq + p.net - divTot
       + (f.stockI||0)*(1-S.cal.stockFee) - (f.stockR||0);
  const assets = eq + lt + (f.curDebt||0);
  out.push({lt,eq:Math.max(1,eq),sh,assets:Math.max(1,assets),divTot,
   roe:p.net/Math.max(1,eq), roa:p.net/Math.max(1,assets),
   lev:assets/Math.max(1,eq), at:p.rev/Math.max(1,assets)});
 }
 return out;}
const hrSpend=r=>{const h=(S.hr&&S.hr[r])||{};return (h.mfg||0)+(h.sci||0)+(h.sales||0);};
/* Laid out to match Capsim's own income statement line for line, so the two
   reconcile. Three items cannot be derived and are read off the proforma into
   per-round inputs: inventory carry, any non-HR "other" fees, and the working-
   capital swing used for operating cash. HR spend is the "Other" line — in this
   sim the two are the same number. */
function pnlRaw(r,ltDebt,f){
 let rev=0,labmat=0,dep=0,promo=0,sales=0,rd=0,inv=0;
 S.products.forEach((P,i)=>{if(r<P.launch)return;const c=P.rounds[r],u=units(i,r);
  rev+=u*c.price; labmat+=u*varCost(i,r);
  dep+=((c.cap||0)*(S.cal.capCost+S.cal.autoCost*(c.auto||0)))/S.cal.depYears;
  promo+=(c.promo||0); sales+=(c.sales||0); rd+=(c.rdc||0);
  inv+=plantInvest(i,r);});
 const carry=(f.invCarry||0);
 const admin=rev*(S.cal.adminRate||0);
 const other=hrSpend(r)+(f.otherFees||0);       // Capsim's "Other" = HR + fees
 const cm=rev-labmat-carry;
 const sga=promo+sales+rd+admin;
 const netMargin=cm-dep-sga;
 const ebit=netMargin-other;
 const fx=dep+sga+other;                          // keeps cm - fx = ebit for the CBA
 const int=(f.curDebt||0)*S.cal.interestST + (ltDebt||0)*S.cal.interestLT;
 const fee=(f.bondR||0)*S.cal.bondFee + (f.stockI||0)*S.cal.stockFee;
 const pre=ebit-int-fee, tax=Math.max(0,pre)*S.cal.taxRate;
 const psh=Math.max(0,pre-tax)*(S.cal.profitShareRate||0);
 const net=pre-tax-psh;
 return {rev,vc:labmat+carry,labmat,carry,dep,promo,sales,rd,admin,sga,other,
  cm,fx,netMargin,ebit,int,fee,pre,tax,psh,net,inv,
  cmPct:rev>0?cm/rev:0,ros:rev>0?net/rev:0};}

/* Cash flow, mirroring the sim: start + operating + investing + financing.
   Operating = net + depreciation + the working-capital swing (an input, because
   inventory/AR/AP dollar balances are not tracked here). Starting cash is
   anchored to the actual close of the prior round where we have it, otherwise it
   chains from the computed close. */
function cashRow(r){
 const p=pnl(r), f=S.fin[r]||{}, b=balances()[r];
 const start = (f.cashStart!=null) ? f.cashStart
   : (r>0 ? cashRow(r-1).close : (S.open.cash||0));
 const op = p.net + p.dep + (f.wcChange||0);
 const investCash = -p.inv;
 const finCash = (f.bondI||0)-(f.bondR||0)+(f.stockI||0)-(f.stockR||0)
   - (b.divTot||0) - (f.curDebtDue||0);
 const close = start + op + investCash + finCash;
 return {start,op,invest:investCash,fin:finCash,close};}
function pnl(r){
 let lt=S.open.ltDebt;
 for(let k=0;k<=r;k++){const f=S.fin[k]||{};lt=lt+(f.bondI||0)-(f.bondR||0);}
 return pnlRaw(r,lt,S.fin[r]||{});}
const money=v=>{v=Math.round(v)||0;return v<0?"($"+Math.abs(v).toLocaleString()+")":"$"+v.toLocaleString();};
const pct=v=>(100*v).toFixed(1)+"%";
const EST='<span class="estmark" title="Estimated — calibrate on the Calibration tab">&bull;</span>';

/* ---------------- charts (inline SVG, no libraries) ---------------------- */
function axes(w,h,pad,maxV,ticks,fmt){
 let g=`<line x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}" stroke="#c3ccd6"/>`;
 for(let i=0;i<=ticks;i++){
  const v=maxV*i/ticks, y=h-pad.b-(h-pad.b-pad.t)*i/ticks;
  g+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eef2f7"/>
      <text x="${pad.l-6}" y="${y+3.5}" font-size="9.5" fill="#94a3b8" text-anchor="end">${fmt(v)}</text>`;}
 return g;}
/* grouped vertical bars: items=[{label,newV,oldV}] */
function vbars(items,opt){
 const w=opt.w||300,h=opt.h||118,pad={l:opt.l||34,r:6,t:9,b:20};
 const maxV=opt.max||Math.max(...items.flatMap(i=>[i.newV,i.oldV||0]))*1.15||1;
 const bw=(w-pad.l-pad.r)/items.length, gw=Math.min(22,bw*.32);
 let g=axes(w,h,pad,maxV,4,opt.fmt||(v=>v.toFixed(0)));
 items.forEach((it,k)=>{
  const cx=pad.l+bw*(k+.5), H=h-pad.b-pad.t;
  const bh=v=>Math.max(0,(v/maxV)*H);
  if(it.oldV!==undefined){
   g+=`<rect x="${cx+1}" y="${h-pad.b-bh(it.oldV)}" width="${gw}" height="${bh(it.oldV)}" fill="${opt.oldC||"#3f4550"}"/>`;
   g+=`<rect x="${cx-gw-1}" y="${h-pad.b-bh(it.newV)}" width="${gw}" height="${bh(it.newV)}" fill="${it.c||opt.newC||"#5b9bd5"}"/>`;
  }else{
   g+=`<rect x="${cx-gw/2}" y="${h-pad.b-bh(it.newV)}" width="${gw}" height="${bh(it.newV)}" fill="${it.c||opt.newC||"#5b9bd5"}"/>`;
   g+=`<text x="${cx}" y="${h-pad.b-bh(it.newV)-4}" font-size="9.5" font-weight="700" fill="#334155"
        text-anchor="middle">${(opt.fmt||(v=>v.toFixed(0)))(it.newV)}</text>`;}
  g+=`<text x="${cx}" y="${h-pad.b+13}" font-size="10" fill="#475569" text-anchor="middle">${it.label}</text>`;});
 return `<svg viewBox="0 0 ${w} ${h}" width="100%">${g}</svg>`;}
/* grouped horizontal bars: items=[{label,newV,oldV}] */

 const Y=v=>h-pad.b-(v/maxV)*H;
 pts.forEach((o,k)=>{

  g+=`<line x1="${x1}" y1="${Y(o.o)}" x2="${x2}" y2="${Y(o.e)}" stroke="${o.c}" stroke-width="1.8"/>
      <circle cx="${x1}" cy="${Y(o.o)}" r="3.2" fill="#fff" stroke="${o.c}" stroke-width="1.8"/>
      <circle cx="${x2}" cy="${Y(o.e)}" r="3.6" fill="${o.c}"/>

 // segment age targets as dashed guides

/* ---------------- perceptual map ---------------------------------------- */
const M=50,W=560,IN=W-M*2;
const X=v=>M+(v/20)*IN, Y=v=>M+(1-v/20)*IN, RAD=u=>(u/20)*IN;
const RT2=Math.SQRT2, RFI=2.5/RT2, RGH=4/RT2;
function zones(r){const P=i=>SEG[i].cp+SEG[i].dp*r;
 const pair=(a,b)=>{const lo=P(a),hi=P(b),gap=(hi-lo)*RT2;
  const rl=hi-RGH,rh=lo+RGH,fl=hi-RFI,fh=lo+RFI,mid=(lo+hi)/2;
  return{a:SEG[a].n,b:SEG[b].n,gap,rough:rh>rl?[rl,rh]:null,fine:fh>fl?[fl,fh]:null,mid,midS:20-mid,md:gap/2};};
 return [pair(1,0),pair(0,2)];}
/* ---------------- map zoom ----------------------------------------------
   viewBox arithmetic only: the drawing never changes, we just look at less of
   it. Scale 1 shows the whole 0-20 board. Panning is clamped so you cannot
   drag the board off screen. */
const Z={s:1,cx:280,cy:280};
function clampZ(){
 Z.s=Math.min(8,Math.max(1,Z.s));
 const h=280/Z.s;
 Z.cx=Math.min(560-h,Math.max(h,Z.cx));
 Z.cy=Math.min(560-h,Math.max(h,Z.cy));}
function vb(){const w=560/Z.s;return `${(Z.cx-w/2).toFixed(2)} ${(Z.cy-w/2).toFixed(2)} ${w.toFixed(2)} ${w.toFixed(2)}`;}
function applyZ(){clampZ();
 document.querySelectorAll("svg[data-map]").forEach(el=>el.setAttribute("viewBox",vb()));
 document.querySelectorAll("[data-zlvl]").forEach(el=>el.textContent=Z.s.toFixed(1)+"x");}
function zoomBy(k){
 Z.s*=k; applyZ();}
function zoomReset(){Z.s=1;Z.cx=280;Z.cy=280;applyZ();}
function zoomBar(pre){
 return `<span class="zbar"><button data-zo="${pre}" title="Zoom out">&minus;</button>
  <span class="lvl" data-zlvl>${Z.s.toFixed(1)}x</span>
  <button data-zi="${pre}" title="Zoom in">+</button>
  <button class="wide" data-zr="${pre}" title="Fit the whole board">Fit</button></span>`;}
/* Wheel zoom keeps the point under the cursor still. Drag pans. */
function wireZoom(el,wheel){
 if(!el||el.dataset.zw) return; el.dataset.zw="1";
 el.style.cursor="grab";
 if(wheel) el.addEventListener("wheel",e=>{
  e.preventDefault();
  const r=el.getBoundingClientRect();
  const fx=(e.clientX-r.left)/r.width, fy=(e.clientY-r.top)/r.height;
  const w0=560/Z.s, ux=Z.cx-w0/2+fx*w0, uy=Z.cy-w0/2+fy*w0;
  Z.s*= e.deltaY<0?1.18:1/1.18; clampZ();
  const w1=560/Z.s;
  Z.cx=ux+w1*(.5-fx); Z.cy=uy+w1*(.5-fy);
  applyZ();},{passive:false});
 let dg=null;
 el.addEventListener("pointerdown",e=>{
  dg={x:e.clientX,y:e.clientY,cx:Z.cx,cy:Z.cy};
  try{el.setPointerCapture(e.pointerId);}catch(x){}
  el.style.cursor="grabbing";});
 el.addEventListener("pointermove",e=>{
  if(!dg)return;
  const r=el.getBoundingClientRect(), w=560/Z.s;
  Z.cx=dg.cx-(e.clientX-dg.x)/r.width*w;
  Z.cy=dg.cy-(e.clientY-dg.y)/r.height*w;
  applyZ();});
 const end=()=>{dg=null;el.style.cursor="grab";};
 el.addEventListener("pointerup",end); el.addEventListener("pointercancel",end);
 el.addEventListener("dblclick",()=>zoomReset());}

 SEG.forEach((s,i)=>{

   g+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${s.c}" stroke-width="1"
        stroke-dasharray="3 3" opacity=".45"/>`;}
  const q=centreAt(i,r);
  g+=`<circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RAD(4)}" fill="none" stroke="#7a7a7a" stroke-width="1.1"/>
      <circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RAD(2.5)}" fill="url(#sg)" stroke="#5b9bd5"/>

 SEG.forEach((s,i)=>{const q=centreAt(i,r),d=idealAt(i,r);
  if(s.ox||s.oy)g+=`<line x1="${X(q.p)}" y1="${Y(q.s)}" x2="${X(d.p)}" y2="${Y(d.s)}"
    stroke="${s.c}" stroke-width="1" opacity=".7"/>`;
  g+=`<path d="M${X(d.p)-4.5},${Y(d.s)} h9 M${X(d.p)},${Y(d.s)-4.5} v9" stroke="${s.c}"
       stroke-width="2" stroke-linecap="round"/>
      <text x="${X(q.p)}" y="${Y(q.s)-RAD(2.5)-6}" font-size="10.5" font-weight="700" fill="${s.c}"

 S.products.forEach((P,i)=>{if(r<P.launch)return;const c=P.rounds[r];

/* mk = {band:[lo,hi,colour,label], ticks:[[value,colour,label],...]}
   Bands and ticks are drawn on the track so the acceptable range and the target
   are visible while you drag, rather than something you have to look up. */
/* Draw the tick overlays. Ticks landing on the same spot are merged into one label
   (Traditional's ideal spot IS its centre, so those would otherwise stack), and
   remaining labels alternate above and below the track so they can't collide. */
function ticksHTML(ticks,pos){
 const keep=[];
 (ticks||[]).forEach(t=>{
  if(!t[1]||t[1]==="transparent") return;
  const near=keep.find(k=>Math.abs(pos(k[0])-pos(t[0]))<1.2);
  if(near){ if(t[2]&&near[2]&&near[2]!==t[2]) near[2]=near[2]+" = "+t[2];
            else if(t[2]&&!near[2]) near[2]=t[2]; }
  else keep.push([...t]);});
 keep.sort((a,b)=>pos(a[0])-pos(b[0]));
 let out="";
 keep.forEach((t,i)=>{
  const p=pos(t[0]);
  out+=`<div class="tick" style="left:calc(${p}% - 1px);background:${t[1]}"></div>`;
  if(!t[2]) return;
  // keep labels inside the track at the extremes
  const tx = p<9?"translateX(-8%)" : p>91?"translateX(-92%)" : "translateX(-50%)";
  const top = (i%2===0) ? "-13px" : "17px";
  out+=`<div class="tlab" style="left:${p}%;top:${top};transform:${tx};color:${t[1]}">${t[2]}</div>`;});
 return out;}
function sld(f,label,sub,v,min,max,step,fmt,mk){
 const pos=x=>Math.max(0,Math.min(100,((x-min)/(max-min))*100));
 let ov="";
 if(mk&&mk.band){const[a,b,col]=mk.band;
  ov+=`<div class="band" style="left:${pos(a)}%;width:${Math.max(0,pos(b)-pos(a))}%;background:${col}"></div>`;}
 ov+=ticksHTML(mk&&mk.ticks,pos);
 return `<div class="sld"><div class="lab">${label}<small>${sub||""}</small></div>
  <div class="track"><span class="mm">${fmt?fmt(min):min}</span>
   <div class="tw"><div class="base"></div>${ov}
    <input type="range" min="${min}" max="${max}" step="${step}" value="${v}" data-f="${f}"></div>
   <input class="bub" type="number" min="${min}" max="${max}" step="${step}" value="${v}" data-f="${f}">
   <span class="mm">${fmt?fmt(max):max}</span></div></div>`;}
/* delta chip vs the previous round */
function dlt(cur,prev,fmt,goodUp){
 if(prev===undefined||prev===null||!isFinite(prev))return"";
 const d=cur-prev; if(Math.abs(d)<1e-9)return`<span class="chip flat">no change</span>`;
 const good=goodUp?d>0:d<0;
 return `<span class="chip ${good?'up':'down'}">${d>0?"▲":"▼"} ${fmt(Math.abs(d))}</span>`;}

  rows.forEach(q=>{
   const inPr=q.pr>=priceLo(Psel.seg,r)&&q.pr<=priceHi(Psel.seg,r);

  h+=`</table><div class="note">Competitor figures are the observed snapshot from
   <b>${R(cs.from)}</b>${cs.stale?` and have not been updated for ${R(r)} — rivals will have moved`:``}.

  ${opAuto(sel,r).toFixed(1)} this round even though the slider reads

 const cums=[];
 for(let r=0;r<NR;r++){const p=pnl(r);cum+=p.net;cums.push(cum);
  h+=`<tr class="${r===S.round?'hi':''}"><td class="name">${R(r)}</td>
   <td class="num">${money(p.rev)}</td><td class="num">${money(p.cm)}</td>

   <td><span class="pill ${ACT[r]?'rough':'no'}">${ACT[r]?'projection':'plan'}</span></td></tr>`;}
 h+=`</table><div class="note">Rows are this planner's arithmetic on the forecast you entered,
  which is what the sim's Marketing screen shows too. Closed rounds are marked
  <b>projection</b> because the market rarely delivers exactly the forecast. What actually

 h+=`</table></div>

 h+=`</tr>`;
 S.products.forEach(P=>{h+=`<tr><td class="name">${P.name}</td>`;

 S.products.forEach((P,i)=>{h+=`<tr><td class="name">${P.name}</td>`;
  for(let r=0;r<NR;r++){
   if(r<P.launch){h+=`<td style="color:var(--mut)">—</td>`;continue;}

/* ---------------- cost / benefit ----------------------------------------
   Everything here works by isolation: to price one decision, we rebuild the
   board with that single field put back to its baseline value and recompute.
   The difference is that decision's effect, with every knock-on included
   (a bigger order raises second-shift labour, which changes contribution,
   which changes EBIT, and so on). No hand-derived formulas to drift.

   What the model knows exactly: plant and automation cash, labour including
   the second-shift premium, material, inventory carry, promo and sales cash,
   R&D cash, contribution on the units you forecast.
   What it cannot know: how much extra volume a price cut, a promotion or a
   reposition actually buys. Capsim's demand response is not reproducible from
   three rounds of data, and a wrong curve here would quietly corrupt every
   number downstream. So for those levers we report the cost exactly and give
   the breakeven volume instead of inventing a benefit.                      */

const CBAF=[
 {k:"p",    lab:"Performance",   fmt:v=>(+v).toFixed(1),  hard:false},
 {k:"s",    lab:"Size",          fmt:v=>(+v).toFixed(1),  hard:false},
 {k:"m",    lab:"MTBF",          fmt:v=>(+v).toLocaleString(), hard:false},
 {k:"rdc",  lab:"R&D cost",      fmt:v=>$k(v||0),         hard:true},
 {k:"price",lab:"Price",         fmt:v=>$m(v),            hard:false},
 {k:"promo",lab:"Promo budget",  fmt:v=>$k(v),            hard:false},
 {k:"sales",lab:"Sales budget",  fmt:v=>$k(v),            hard:false},
 {k:"fc",   lab:"Forecast",      fmt:v=>(+v).toLocaleString(), hard:false},
 {k:"sched",lab:"Production order",fmt:v=>(+v).toLocaleString(),hard:true},
 {k:"cap",  lab:"Capacity",      fmt:v=>(+v).toLocaleString(), hard:true},
 {k:"auto", lab:"Automation",    fmt:v=>(+v).toFixed(1),  hard:true},
 {k:"mat",  lab:"Material cost", fmt:v=>$m(v),            hard:true}];

const clone=o=>JSON.parse(JSON.stringify(o));
/* The baseline is fixed when the board is seeded or loaded, never on first
   view. Creating it lazily meant any edit made before opening this tab was
   quietly absorbed into the baseline and priced at zero. */
function baseState(){
 if(!S.base) S.base=clone({products:S.products,fin:S.fin,hr:S.hr});
 return S.base;}

/* Run cb() against a swapped-in board, then put the real one back. */
function withBoard(prods,fin,cb){
 const sp=S.products, sf=S.fin, sh=S.hr;
 S.products=prods; S.fin=fin||sf; if(arguments.length>3) S.hr=arguments[3];
 try{ return cb(); } finally { S.products=sp; S.fin=sf; S.hr=sh; }}

/* Totals for one round: contribution, period cost, EBIT, net, plant cash. */
function mx(r){
 const p=pnl(r);
 let plant=0; S.products.forEach((P,i)=>{if(r>=P.launch) plant+=plantInvest(i,r);});
 let cash=hrSpend(r); S.products.forEach((P,i)=>{if(r>=P.launch){const c=P.rounds[r];
  cash+=(c.promo||0)+(c.sales||0)+(c.rdc||0);}});
 return {rev:p.rev,cm:p.cm,fx:p.fx,ebit:p.ebit,net:p.net,plant,spend:cash,
         units:S.products.reduce((t,P,i)=>t+(r>=P.launch?units(i,r):0),0)};}

/* Same totals from the locked baseline. */
function mxBase(r){const b=baseState();return withBoard(b.products,b.fin,()=>mx(r));}

/* Horizon: the selected round, and everything from it to the end. */
function cbaSpan(){const out=[];for(let r=S.round;r<NR;r++)out.push(r);return out;}
function sumMx(fn,rs){return rs.reduce((a,r)=>{const m=fn(r);
 return {rev:a.rev+m.rev,cm:a.cm+m.cm,fx:a.fx+m.fx,ebit:a.ebit+m.ebit,net:a.net+m.net,
         plant:a.plant+m.plant,spend:a.spend+m.spend,units:a.units+m.units};},
 {rev:0,cm:0,fx:0,ebit:0,net:0,plant:0,spend:0,units:0});}

/* Every field that differs from baseline, with its isolated effect. */
function cbaChanges(){
 const b=baseState(), out=[], rs=cbaSpan(), r0=S.round;
 const hrNow=hrSpend(r0), hrWas=(()=>{const sh=S.hr;S.hr=b.hr;const v=hrSpend(r0);S.hr=sh;return v;})();
 if(Math.abs(hrNow-hrWas)>1e-9){
  const altHR=clone(S.hr); for(let r=r0;r<NR;r++) altHR[r]=b.hr[r]?clone(b.hr[r]):altHR[r];
  const cn=mx(r0), cbv=withBoard(S.products,S.fin,()=>mx(r0),altHR);
  const sn=sumMx(mx,rs), sbv=withBoard(S.products,S.fin,()=>sumMx(mx,rs),altHR);
  const dNow={},dAll={};
  ["cm","fx","ebit","net","plant","spend","units"].forEach(k=>{dNow[k]=cn[k]-cbv[k];dAll[k]=sn[k]-sbv[k];});
  out.push({pi:-1,name:"Company",f:{k:"hr",lab:"HR spend",fmt:v=>$k(v||0),hard:true},
   now:hrNow,was:hrWas,dNow,dAll,hr:true});}
 S.products.forEach((P,i)=>{
  const B=b.products[i]; if(!B) return;          // product added since locking
  if(r0<P.launch) return;
  CBAF.forEach(f=>{
   const now=P.rounds[r0][f.k]||0, was=B.rounds[r0]?(B.rounds[r0][f.k]||0):0;
   if(Math.abs(now-was)<1e-9) return;
   // revert this one field, in this round and every later one, then recompute
   const alt=clone(S.products);
   for(let r=r0;r<NR;r++) alt[i].rounds[r][f.k]=B.rounds[r]?B.rounds[r][f.k]:now;
   const dNow ={}, dAll={};
   const cn=mx(r0), cb=withBoard(alt,null,()=>mx(r0));
   ["cm","fx","ebit","net","plant","spend","units"].forEach(k=>dNow[k]=cn[k]-cb[k]);
   const sn=sumMx(mx,rs), sb=withBoard(alt,null,()=>sumMx(mx,rs));
   ["cm","fx","ebit","net","plant","spend","units"].forEach(k=>dAll[k]=sn[k]-sb[k]);
   out.push({pi:i,name:P.name,f,now,was,dNow,dAll});});});
 return out;}

/* Unit contribution for the selected product, used for breakeven volumes. */
function unitCM(i,r){
 const c=S.products[i].rounds[r];
 return (c.price||0)-varCost(i,r);}

function tCBA(){
 const r=S.round, rs=cbaSpan(), b=baseState();
 const cur=mx(r), bas=mxBase(r);
 const curAll=sumMx(mx,rs), basAll=withBoard(b.products,b.fin,()=>sumMx(mx,rs));
 const ch=cbaChanges();
 const d=(a,z)=>a-z;
 const sign=v=>v>0?"var(--good)":v<0?"var(--bad)":"inherit";
 const dm=v=>(v>0?"+":"")+money(v);

 let h=`<div class="card">
  <h2>Cost / benefit &mdash; ${R(r)}</h2>
  <p class="sub">Everything below compares the board as it stands against the locked baseline.
   It recomputes as you move any slider on any tab.</p>
  <div class="bar">
   <button class="btn" id="bLock">Lock current board as baseline</button>
   <button class="btn" id="bRevert">Discard changes, back to baseline</button>
   <span style="flex:1"></span>
   <span class="note" style="margin:0">Horizon: <b>${R(r)}</b> and cumulative to <b>${R(NR-1)}</b></span>
  </div>
  <div class="kpi">
   <div><b style="color:${sign(d(cur.cm,bas.cm))}">${dm(d(cur.cm,bas.cm))}</b><span>Contribution, ${R(r)}</span></div>
   <div><b style="color:${sign(d(cur.ebit,bas.ebit))}">${dm(d(cur.ebit,bas.ebit))}</b><span>EBIT, ${R(r)}</span></div>
   <div><b style="color:${sign(d(cur.net,bas.net))}">${dm(d(cur.net,bas.net))}</b><span>Net profit, ${R(r)}</span></div>
   <div><b style="color:${sign(-d(cur.plant,bas.plant))}">${dm(d(cur.plant,bas.plant))}</b><span>Plant cash out</span></div>
   <div><b style="color:${sign(d(curAll.net,basAll.net))}">${dm(d(curAll.net,basAll.net))}</b><span>Net profit to ${R(NR-1)}</span></div>
   <div><b>${(d(cur.units,bas.units)>0?"+":"")+d(cur.units,bas.units).toLocaleString()}</b><span>Forecast units</span></div>
  </div>
  <table>
   <tr><th class="l">Line</th><th>Baseline ${R(r)}</th><th>Now</th><th>Change</th>
    <th>Baseline to ${R(NR-1)}</th><th>Now</th><th>Change</th></tr>`;
 [["Revenue","rev"],["Contribution","cm"],["Period costs","fx"],["EBIT","ebit"],
  ["Net profit","net"],["Plant investment","plant"]].forEach(([lab,k])=>{
  const good=k==="fx"||k==="plant"?-1:1;
  h+=`<tr><td class="name">${lab}</td>
   <td class="num">${money(bas[k])}</td><td class="num">${money(cur[k])}</td>
   <td class="num" style="color:${sign(good*d(cur[k],bas[k]))}"><b>${dm(d(cur[k],bas[k]))}</b></td>
   <td class="num">${money(basAll[k])}</td><td class="num">${money(curAll[k])}</td>
   <td class="num" style="color:${sign(good*d(curAll[k],basAll[k]))}"><b>${dm(d(curAll[k],basAll[k]))}</b></td></tr>`;});
 h+=`</table></div>`;

 /* ---- what changed, priced one lever at a time ---- */
 h+=`<div class="card"><h2>Every change, priced separately</h2>`;
 if(!ch.length){
  h+=`<p class="sub">Nothing differs from the baseline in ${R(r)} yet. Move a slider on any tab and
   it will appear here with its cost and its effect.</p>`;
 }else{
  const hard=ch.filter(c=>c.f.hard), soft=ch.filter(c=>!c.f.hard);
  h+=`<p class="sub">Each row rebuilds the board with that one field put back, so the figure is that
   decision's own effect with all knock-ons included. Rows can interact, so they will not always add
   exactly to the totals above.</p>
   <table><tr><th class="l">Product</th><th class="l">Lever</th><th>Baseline</th><th>Now</th>
   <th>Cash out</th><th>Net profit ${R(r)}</th><th>Net profit to ${R(NR-1)}</th><th class="l">Read</th></tr>`;
  hard.forEach(c=>{
   const cash=c.dNow.plant+c.dNow.spend;
   const pay=cash>0&&c.dAll.net>0?(cash/(c.dAll.net/rs.length)):null;
   const cc=c.hr?null:S.products[c.pi].rounds[r];
   const over=cc?((cc.sched||0)-(cc.fc||0)+(cc.inv||0)):0;
   const glut=cc&&c.f.k==="sched"&&over>Math.max(60,(cc.fc||0)*0.12);
   h+=`<tr><td class="name">${c.name}</td><td class="l">${c.f.lab}</td>
    <td class="num">${c.f.fmt(c.was)}</td><td class="num">${c.f.fmt(c.now)}</td>
    <td class="num" style="color:${sign(-cash)}">${cash?dm(cash):"—"}</td>
    <td class="num" style="color:${sign(c.dNow.net)}">${dm(c.dNow.net)}</td>
    <td class="num" style="color:${sign(c.dAll.net)}"><b>${dm(c.dAll.net)}</b></td>
    <td class="l">${c.hr?`<b style="color:var(--warn)">cash cost only — its labour saving lives in the wage, not this row</b>`
      :glut?`<b style="color:var(--warn)">${over.toLocaleString()} units above forecast — raise the forecast or trim the order</b>`
      :cash>0&&c.dAll.net>0?`pays back in ${pay.toFixed(1)} yr`
      :cash>0&&c.dAll.net<=0?`<b style="color:var(--bad)">does not pay back by ${R(NR-1)}</b>`
      :c.dAll.net>0?"free gain":"—"}</td></tr>`;});
  if(soft.length){
   h+=`<tr class="tot"><td class="l" colspan="8">Demand-driven levers &mdash; cost is exact, benefit is your call</td></tr>`;
   soft.forEach(c=>{
    const cash=c.dNow.plant+c.dNow.spend;
    const ucm=unitCM(c.pi,r);
    const outlay=(c.f.k==="price")?-c.dNow.cm:cash;
    const be=ucm>0&&outlay>0?outlay/ucm:null;
    const isFc=c.f.k==="fc";
    h+=`<tr><td class="name">${c.name}</td><td class="l">${c.f.lab}</td>
     <td class="num">${c.f.fmt(c.was)}</td><td class="num">${c.f.fmt(c.now)}</td>
     <td class="num" style="color:${sign(-outlay)}">${outlay?dm(outlay):"—"}</td>
     <td class="num" style="color:${sign(c.dNow.net)}">${dm(c.dNow.net)}</td>
     <td class="num" style="color:${sign(c.dAll.net)}"><b>${dm(c.dAll.net)}</b></td>
     <td class="l">${isFc?`<b style="color:var(--warn)">assumption, not a gain</b> — this profit only
        arrives if the ${(c.now-c.was)>0?"extra "+(c.now-c.was).toLocaleString()+" units":"volume"} actually sell`
       :be?`breaks even at <b>+${Math.ceil(be).toLocaleString()}</b> units`
       :outlay<0?"releases cash":"—"}</td></tr>`;});}
  h+=`</table>`;}
 h+=`<div class="note"><b>Why some rows show no benefit.</b> This planner sets volume from the
  forecast you type, exactly as the sim's own Marketing screen does. It has no demand curve, so a
  price cut, a bigger promotion or a reposition costs money here and returns nothing until you raise
  the forecast to match what you think it will buy. That is the honest position: the breakeven column
  tells you how many extra units the move has to deliver to wash its face, and you decide whether the
  segment will give you them.</div></div>`;

 /* ---- payback on the things that are pure arithmetic ---- */
 h+=`<div class="card"><h2>Investment paybacks</h2>
  <p class="sub">Plant and automation, where cost and saving are both exact. Automation cuts labour
   per unit for as long as you own the plant, so one round always looks worse than six.
   Automation ordered now runs next year, so the current round often shows nothing saved.
   <b>These columns are cash</b>: labour saved, against cash paid. The net-profit column in the table
   above is the accounting view of the same move, lower because it also carries the extra depreciation
   and tax. Neither is wrong; they answer different questions.</p>
  <table><tr><th class="l">Product</th><th>Capacity</th><th>Automation</th><th>Cash out ${R(r)}</th>
  <th>Labour saved ${R(r)}</th><th>Saved to ${R(NR-1)}</th><th class="l">Cash payback</th></tr>`;
 let any=false;
 S.products.forEach((P,i)=>{
  if(r<P.launch) return;
  const B=b.products[i]; if(!B) return;
  const c=P.rounds[r], bc=B.rounds[r];
  if(Math.abs((c.cap||0)-(bc.cap||0))<1e-9 && Math.abs((c.auto||0)-(bc.auto||0))<1e-9) return;
  any=true;
  const alt=clone(S.products);
  for(let k=r;k<NR;k++){alt[i].rounds[k].cap=B.rounds[k].cap;alt[i].rounds[k].auto=B.rounds[k].auto;}
  const cash=mx(r).plant-withBoard(alt,null,()=>mx(r)).plant;
  const sNow=mx(r).cm-withBoard(alt,null,()=>mx(r)).cm;
  const sAll=sumMx(mx,rs).cm-withBoard(alt,null,()=>sumMx(mx,rs)).cm;
  const yrs=cash>0&&sNow>0?cash/sNow:null;
  h+=`<tr><td class="name">${P.name}</td>
   <td class="num">${(bc.cap||0).toLocaleString()} &rarr; ${(c.cap||0).toLocaleString()}</td>
   <td class="num">${(bc.auto||0).toFixed(1)} &rarr; ${(c.auto||0).toFixed(1)}</td>
   <td class="num" style="color:var(--bad)">${money(cash)}</td>
   <td class="num" style="color:${sign(sNow)}">${dm(sNow)}</td>
   <td class="num" style="color:${sign(sAll)}"><b>${dm(sAll)}</b></td>
   <td class="l">${yrs?(sAll>cash?`<b style="color:var(--good)">returns its cash in ${yrs.toFixed(1)} yr</b>`
     :`${yrs.toFixed(1)} yr on cash, still short by ${R(NR-1)}`)
     :sAll>0?`saving starts ${R(Math.min(r+1,NR-1))} — ${sAll>cash?`<b style="color:var(--good)">clears ${money(cash)} by ${R(NR-1)}</b>`:`${money(sAll)} by ${R(NR-1)}`}`
     :"no labour saving"}</td></tr>`;});
 if(!any) h+=`<tr><td class="l" colspan="7" style="color:var(--mut);font-style:italic">
  No capacity or automation change in ${R(r)}.</td></tr>`;
 h+=`</table><div class="note"><b>Second shift is the alternative you are choosing against.</b>
  Any plant runs to double its capacity at a ${(S.cal.shiftPremium*100).toFixed(0)}% labour premium on
  the units above the first shift. Buying capacity only beats that once a product reliably sells past
  the second-shift ceiling. Automation is different: it lowers labour on every unit whether or not you
  ever add plant, which is why it usually pays back and capacity often does not.</div></div>`;
 return h;}

/* multi-line trend chart: series={K:[v0,v1,v2]}, one coloured line per company */
function lineChart(series,opt){
 const w=opt.w||330,h=opt.h||150,pad={l:opt.l||40,r:10,t:10,b:20};
 const xs=CH_R, n=xs.length;
 const all=Object.values(series).flat().filter(v=>v!=null);
 let lo=opt.min!=null?opt.min:Math.min(...all), hi=opt.max!=null?opt.max:Math.max(...all);
 if(hi===lo){hi+=1;lo-=1;} const pv=(hi-lo)*.08; hi+=pv; lo-=pv;
 const X=i=>pad.l+(w-pad.l-pad.r)*i/(n-1);
 const Y=v=>h-pad.b-(h-pad.b-pad.t)*(v-lo)/(hi-lo);
 let g="";
 // gridlines + y labels
 for(let t=0;t<=4;t++){const v=lo+(hi-lo)*t/4,y=Y(v);
  g+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eef2f7"/>
   <text x="${pad.l-5}" y="${y+3}" font-size="9" fill="#94a3b8" text-anchor="end">${(opt.fmt||(v=>v.toFixed(0)))(v)}</text>`;}
 // optional shaded band (e.g. healthy leverage)
 if(opt.band){const y1=Y(opt.band[1]),y2=Y(opt.band[0]);
  g+=`<rect x="${pad.l}" y="${y1}" width="${w-pad.l-pad.r}" height="${Math.max(0,y2-y1)}" fill="#16a34a" opacity=".08"/>`;}
 xs.forEach(i=>g+=`<text x="${X(i)}" y="${h-pad.b+13}" font-size="9" fill="#64748b" text-anchor="middle">R${i+1}</text>`);
 Object.entries(series).forEach(([k,vs])=>{
  const co=rvOf(k), me=k==="D";
  const pts=vs.map((v,i)=>v==null?null:`${X(i)},${Y(v)}`).filter(Boolean).join(" ");
  g+=`<polyline points="${pts}" fill="none" stroke="${co.c}" stroke-width="${me?3:1.6}"
    opacity="${me?1:.85}" stroke-linejoin="round"/>`;
  vs.forEach((v,i)=>{if(v!=null)g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="${me?3.4:2.4}" fill="${co.c}"/>`;});
 });
 return `<svg viewBox="0 0 ${w} ${h}" width="100%">${g}</svg>`;}

function chLegend(){return `<div class="legend">${RIVAL.map(x=>
  `<span><i class="sw" style="background:${x.c};border-radius:50%"></i>${x.n}${x.k==="D"?" (us)":""}</span>`).join("")}</div>`;}

    <div class="col"><div class="flag" style="background:#f2f6fa;color:var(--ink)"><b>What they're doing</b></div>
     <p style="font-size:12.5px;margin:6px 0 0">${rd.doing}</p></div>
    <div class="col"><div class="flag" style="background:#f2f6fa;color:var(--ink)"><b>Why (inferred)</b></div>
     <p style="font-size:12.5px;margin:6px 0 0">${rd.why}</p></div>
   </div>
   <div class="flag o" style="margin-top:10px"><b>How we counter</b></div>
   <p style="font-size:12.5px;margin:6px 0 0">${rd.counter}</p></div>`;});

 // head-to-head by segment (who threatens which Digby product)
 const snap=COMPHIST.snap[r]||[];
 h+=`<div class="card"><h2>Head-to-head: who is nearest each of our products — ${R(r)}</h2>
  <p class="sub">The closest rival by position in each product's segment, with their price and how they
   compare to ours. This is where a counter actually lands.</p>
  <table><tr><th class="l">Our product</th><th>Our price</th><th class="l">Nearest rival</th>
   <th>Their price</th><th>Their position</th><th class="l">Read</th></tr>`;
 S.products.forEach((P,i)=>{
  if(r<P.launch) return;
  const c=P.rounds[r], id=idealAt(P.seg,r);
  const rivals=snap.filter(q=>q.co!=="D"&&q.sg===SEG[P.seg].n.slice(0,4));
  if(!rivals.length){h+=`<tr><td class="name">${P.name}</td><td class="num">${$m(c.price)}</td>
    <td class="l" colspan="4" style="color:var(--mut)">no rival in ${SEG[P.seg].n} this round</td></tr>`;return;}
  const near=rivals.map(q=>({...q,d:dist(q.pf,q.sz,c.p,c.s)})).sort((a,b)=>a.d-b.d)[0];
  const rc=rvOf(near.co), cheaper=near.pr<c.price;
  h+=`<tr><td class="name">${P.name}</td><td class="num">${$m(c.price)}</td>
   <td class="l" style="color:${rc.c};font-weight:700">${near.n}</td>
   <td class="num" style="color:${cheaper?'var(--bad)':'inherit'}">${$m(near.pr)}</td>
   <td class="num">${near.pf}/${near.sz}</td>
   <td class="l">${cheaper?`undercuts us by ${$m(c.price-near.pr)}`:`we are ${$m(near.pr-c.price)} cheaper`}, ${near.d<0.5?"nearly on top of us":near.d<1.5?"close":"further out"}</td></tr>`;});
 h+=`</table><div class="note">Distance is straight-line on the perceptual map. A rival sitting on top
   of one of our products and pricing under it is the clearest counter target — match position, then
   decide whether to hold margin or contest on price.</div></div>`;
 return h;}

/* ---------------- render / events --------------------------------------- */
const TABS=["R&D","Marketing","Production","Finance","Cost / benefit","Rivals","Scorecard","Calibration","Decision Reports"];
function render(){
 document.getElementById("rounds").innerHTML=Array.from({length:NR},(_,r)=>
  `<button data-r="${r}" class="${r===S.round?'on':''}">${R(r)}</button>`).join("");
 document.getElementById("tabs").innerHTML=TABS.map((t,i)=>
  `<button data-t="${i}" class="${i===tab?'on':''}">${t}</button>`).join("");
 if(sel>=S.products.length) sel=0;
 const r=S.round;
 document.getElementById("body").innerHTML=
  tab===0?tRD(r):tab===1?tMkt(r):tab===2?tProd(r):tab===3?tFin(r):tab===4?tCBA():tab===5?tRivals():tab===6?tScore():tab===7?tCal():tRpt();
 document.getElementById("modal").innerHTML=modalHTML();
 wire(); save();}

const CARRY=["p","s","m","cap","auto","mat"];
/* rdc is deliberately not carried: an R&D project is paid for in its own round. */
function setField(f,v){
 const r=S.round;
 if(CARRY.includes(f)) for(let k=r;k<NR;k++) S.products[sel].rounds[k][f]=v;
 else S.products[sel].rounds[r][f]=v;}

function wire(){
 document.querySelectorAll("#rounds button").forEach(b=>b.onclick=()=>{S.round=+b.dataset.r;render();});
 document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
  tab=+b.dataset.t;
  // Decision Reports: if this round has no report, open the most recent one that does
  if(TABS[tab]==="Decision Reports"&&!REPORTS[S.round]){
   const ks=Object.keys(REPORTS).map(Number).filter(k=>k<=S.round);
   const k=ks.length?Math.max(...ks):Math.max(...Object.keys(REPORTS).map(Number));
   if(k!==undefined&&isFinite(k)) S.round=k;}
  render();});
 document.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{
  if(b.dataset.sel==="add"){
   const q=idealAt(2,S.round);
   let n=0,nm;do{nm="Product "+(++n);}while(S.products.some(p=>p.name===nm));
   S.products.push({name:nm,key:nm,seg:2,launch:S.round,added:true,
    sp:q.p,ss:q.s,sm:20000,sa:0,sau:3,m0:14,
    rounds:Array.from({length:NR},()=>({p:q.p,s:q.s,m:20000,date:"",price:35,promo:1000,sales:1000,
     fc:0,cap:400,auto:3,sched:0,inv:0,mat:14,rdc:0,aware:0,access:0}))});
   sel=S.products.length-1;
  }else{const n=+b.dataset.sel; if(n!==sel) ren=false; sel=n;}
  render();});
 // double-click the selected tab, or the pencil, to rename
 document.querySelectorAll("#body [data-sel]").forEach(b=>{
  if(b.dataset.sel==="add")return;
  b.ondblclick=()=>{sel=+b.dataset.sel;ren=true;render();};});
 const rg=document.querySelector("[data-ren-go]");
 if(rg)rg.onclick=()=>{ren=true;render();};
 const ri=document.querySelector("[data-ren]");
 if(ri){
  ri.focus(); ri.select();
  const commit=()=>{
   const v=ri.value.trim();
   if(v) S.products[sel].name=v;
   ren=false; render();};
  ri.onkeydown=e=>{
   if(e.key==="Enter"){e.preventDefault();commit();}
   else if(e.key==="Escape"){e.preventDefault();ren=false;render();}};
  ri.onblur=commit;}
 const cc=document.getElementById("ccor"),ct=document.getElementById("ctra");
 if(cc)cc.onchange=()=>{O.corridor=cc.checked;render();};
 if(ct)ct.onchange=()=>{O.trails=ct.checked;render();};
 const cm=document.getElementById("ccmp"),cl=document.getElementById("clab");
 if(cm)cm.onchange=()=>{O.comp=cm.checked;render();};
 if(cl)cl.onchange=()=>{O.complab=cl.checked;render();};

 // popout: open, close, and the duplicate toggle set inside the modal
 document.querySelectorAll("[data-zi]").forEach(b=>b.onclick=()=>zoomBy(1.35));
 document.querySelectorAll("[data-zo]").forEach(b=>b.onclick=()=>zoomBy(1/1.35));
 document.querySelectorAll("[data-zr]").forEach(b=>b.onclick=()=>zoomReset());
 document.querySelectorAll('svg[data-map]').forEach(el=>
  wireZoom(el, el.dataset.map==="modal"));

 const bl=document.getElementById("bLock");
 if(bl)bl.onclick=()=>{S.base={products:clone(S.products),fin:clone(S.fin)};render();
  toast("Baseline locked to the current board");};
 const br=document.getElementById("bRevert");
 if(br)br.onclick=()=>{if(confirm("Discard every change since the baseline was locked?")){
  const b=baseState();S.products=clone(b.products);S.fin=clone(b.fin);render();toast("Back to baseline");}};

 const bp=document.getElementById("bpop");
 if(bp)bp.onclick=()=>{O.pop=true;render();};
 const mc=document.getElementById("mcls");
 if(mc)mc.onclick=()=>{O.pop=false;render();};
 const bk=document.getElementById("mbk");
 if(bk)bk.onclick=e=>{if(e.target===bk){O.pop=false;render();}};
 [["mcor","corridor"],["mtra","trails"],["mcmp","comp"],["mlab","complab"]].forEach(([id,k])=>{
  const el=document.getElementById(id);
  if(el)el.onchange=()=>{O[k]=el.checked;render();};});
 const clr=document.querySelector("[data-clr]");
 if(clr)clr.onclick=()=>{S.products[sel].rounds[S.round].date="";render();};

 // sliders: live-update the paired bubble while dragging, commit on release
 document.querySelectorAll('input[type=range][data-f]').forEach(el=>{
  const f=el.dataset.f;
  const bub=[...document.querySelectorAll(`input.bub[data-f="${f}"]`)][0];
  el.addEventListener("input",()=>{ if(bub) bub.value=el.value; setField(f,parseFloat(el.value)); });
  el.addEventListener("change",()=>{ setField(f,parseFloat(el.value)); render(); });});
 document.querySelectorAll('input.bub[data-f]').forEach(el=>{
  el.addEventListener("change",()=>{let v=parseFloat(el.value);if(isNaN(v))v=0;
   setField(el.dataset.f,v);render();});});
 document.querySelectorAll('input[type=date][data-f]').forEach(el=>{
  el.addEventListener("change",()=>{S.products[sel].rounds[S.round].date=el.value;render();});});

 document.querySelectorAll('[data-fin]').forEach(el=>{
  const k=el.dataset.fin;
  if(el.type==="range"){
   const bub=[...document.querySelectorAll(`input.bub[data-fin="${k}"]`)][0];
   el.addEventListener("input",()=>{if(bub)bub.value=el.value;S.fin[S.round][k]=parseFloat(el.value);});
   el.addEventListener("change",()=>{S.fin[S.round][k]=parseFloat(el.value);render();});
  }else el.addEventListener("change",()=>{let v=parseFloat(el.value);if(isNaN(v))v=0;
   S.fin[S.round][k]=v;render();});});
 document.querySelectorAll('[data-cal]').forEach(el=>el.addEventListener("change",()=>{
  let v=parseFloat(el.value);if(isNaN(v))v=0;S.cal[el.dataset.cal]=v;render();}));
 document.querySelectorAll('[data-fin2]').forEach(el=>el.addEventListener("change",()=>{
  const k=el.dataset.fin2, raw=el.value.trim();
  S.fin[S.round]=S.fin[S.round]||{};
  if(raw===""){ delete S.fin[S.round][k]; } else { const v=parseFloat(raw); if(!isNaN(v)) S.fin[S.round][k]=v; }
  render();}));
 document.querySelectorAll('[data-hr]').forEach(el=>el.addEventListener("change",()=>{
  const k=el.dataset.hr; let v=parseFloat(el.value); if(isNaN(v)||v<0)v=0;
  S.hr[S.round]=S.hr[S.round]||{mfg:0,sci:0,sales:0}; S.hr[S.round][k]=v; render();}));
 document.querySelectorAll('[data-wage]').forEach(el=>el.addEventListener("change",()=>{
  const r=+el.dataset.wage; let v=parseFloat(el.value);
  if(isNaN(v)||v<=0) return render();
  S.cal.wage=S.cal.wage||[];
  while(S.cal.wage.length<r) S.cal.wage.push(wageAt(S.cal.wage.length));
  S.cal.wage[r]=v; render();}));
 document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener("change",()=>{
  let v=parseFloat(el.value);if(isNaN(v))v=0;S.open[el.dataset.open]=v;render();}));}

document.getElementById("bSave").onclick=()=>{
 const b=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(b);
 const fn="digby-capsim-"+stamp()+".json";
 a.download=fn;a.click();
 toast("Saved "+fn);};
document.getElementById("bLoad").onclick=()=>document.getElementById("fIn").click();
document.getElementById("fIn").onchange=e=>{const f=e.target.files[0];if(!f)return;
 const rd=new FileReader();rd.onload=()=>{try{const o=JSON.parse(rd.result);if(!o.products)throw 0;
  S=o;if(!S.cal)S.cal={...DEF_CAL};if(!S.open)S.open={...DEF_OPEN};
  S.cal={...DEF_CAL,...S.cal};render();toast("Loaded");}
  catch(x){toast("That file could not be read");}};rd.readAsText(f);};
document.getElementById("bLink").onclick=()=>{
 const d=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
 const u=location.origin+location.pathname+"#d="+d;
 navigator.clipboard.writeText(u).then(()=>toast("Share link copied"),()=>prompt("Copy this link:",u));};
document.getElementById("bReset").onclick=()=>{
 if(confirm("Reset every round back to the seeded board?")){
  S=seed();localStorage.removeItem("digbyCapsim");location.hash="";sel=0;render();toast("Reset");}};
document.addEventListener("keydown",e=>{
 if(e.key==="Escape"&&O.pop){O.pop=false;render();}});
render();
</script>
</body>
