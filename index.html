<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Digby Capsim Planner</title>
<style>
:root{--ink:#16202c;--mut:#64748b;--line:#dde4ec;--bg:#f5f7fa;--card:#fff;--nav:#1f3864;
 --acc:#2563eb;--good:#166534;--goodbg:#dcfce7;--warn:#92400e;--warnbg:#fef3c7;
 --bad:#991b1b;--badbg:#fee2e2;--est:#7c3aed;--bub:#f6c344;--new:#5b9bd5;--old:#3f4550}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
 font:14px/1.55 "Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
header{background:var(--nav);color:#fff;padding:11px 20px;display:flex;align-items:center;
 gap:14px;flex-wrap:wrap}
header h1{margin:0;font-size:16px;font-weight:600}
header .sp{flex:1}
header button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);
 padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
header button:hover{background:rgba(255,255,255,.26)}
.rounds{display:flex;gap:5px;padding:10px 20px 0;flex-wrap:wrap}
.rounds button{border:1px solid var(--line);background:var(--card);padding:6px 13px;
 border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut)}
.rounds button.on{background:var(--nav);color:#fff;border-color:var(--nav)}
nav{display:flex;gap:4px;padding:10px 20px 0;flex-wrap:wrap;border-bottom:2px solid var(--line)}
nav button{border:1px solid var(--line);border-bottom:none;background:#eef2f7;padding:8px 16px;
 border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut)}
nav button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 0 0 var(--card)}
.wrap{padding:16px 20px 70px;max-width:1560px}
.card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:14px 17px;
 margin-bottom:15px}
.card h2{margin:0 0 3px;font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.card p.sub{margin:0 0 9px;font-size:12px;color:var(--mut)}
.row{display:flex;gap:15px;align-items:flex-start;flex-wrap:wrap}
.col{flex:1;min-width:330px}
.col.narrow{max-width:600px}
/* product sub-tabs, styled like the sim */
.ptabs{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:14px}
.ptabs button{flex:1;border:none;border-right:1px solid var(--line);background:#eceff3;
 padding:9px 6px;cursor:pointer;font-size:13px;font-weight:650;color:var(--mut)}
.ptabs button:last-child{border-right:none}
.ptabs button.on{background:var(--card);color:var(--ink);box-shadow:inset 0 -3px 0 0 var(--acc)}
/* slider block */
.sld{display:grid;grid-template-columns:118px 1fr;gap:10px;align-items:center;
 padding:9px 0;border-bottom:1px solid var(--line)}
.sld:last-child{border-bottom:none}
.sld .lab{font-size:12.5px;font-weight:650}
.sld .lab small{display:block;font-weight:400;color:var(--mut);font-size:10.5px}
.track{display:flex;align-items:center;gap:9px}
.track .mm{font-size:10.5px;color:var(--mut);min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
/* slider with target band + tick overlays */
.tw{position:relative;flex:1;height:20px;display:flex;align-items:center}
.tw .base{position:absolute;left:0;right:0;height:6px;border-radius:4px;background:#d6dde5}
.tw .band{position:absolute;height:6px;border-radius:3px;pointer-events:none}
.tw .tick{position:absolute;width:2px;height:16px;pointer-events:none;border-radius:1px}
.tw .tlab{position:absolute;top:-1px;font-size:8.5px;font-weight:700;transform:translateX(-50%);
 pointer-events:none;white-space:nowrap}
.tw input[type=range]{position:relative;z-index:2;width:100%;background:transparent}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:4px;
 background:#d6dde5;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;
 border-radius:50%;background:#fff;border:2px solid #9aa7b5;cursor:pointer}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;
 border:2px solid #9aa7b5;cursor:pointer}
.bub{width:74px;padding:3px 4px;border:1px solid #d9b93c;border-radius:5px;background:var(--bub);
 font:inherit;font-size:12.5px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.bub:focus{outline:2px solid var(--acc);outline-offset:-1px}
input[type=date]{padding:4px 6px;border:1px solid var(--line);border-radius:5px;font:inherit;
 font-size:12.5px;background:#fffbe6;width:140px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center}
th{background:#f2f6fa;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
 color:var(--mut);font-weight:700}
td.l,th.l{text-align:left}
td.name{text-align:left;font-weight:650}
tr.tot td{font-weight:700;background:#f7f9fc;border-top:2px solid var(--nav)}
tr.hi td{background:#eef4fc}
.num{font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:700}
.yes{background:var(--goodbg);color:var(--good)}
.rough{background:var(--warnbg);color:var(--warn)}
.no{background:var(--badbg);color:var(--bad)}
.legend{display:flex;gap:13px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--mut)}
.legend span{display:flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.bar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer}
.btn{border:1px solid var(--line);background:var(--card);padding:5px 12px;border-radius:6px;
 cursor:pointer;font-size:12px;font-weight:600;color:var(--mut)}
.btn:hover{background:#f2f6fa}
.note{font-size:11.5px;color:var(--mut);margin-top:10px;line-height:1.6}
.note b{color:var(--warn)}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;margin-bottom:14px}
.kpi div{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}
.kpi b{display:block;font-size:18px;font-weight:700;letter-spacing:-.4px}
.kpi span{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
.flag{padding:7px 12px;border-radius:6px;margin:5px 0;font-size:12.5px;font-weight:600}
.flag.w{background:var(--warnbg);color:var(--warn)}
.flag.e{background:var(--badbg);color:var(--bad)}
.flag.o{background:var(--goodbg);color:var(--good)}
.estmark{color:var(--est);font-weight:700;cursor:help}
.chip{display:inline-block;padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;
 margin-left:5px;vertical-align:middle}
.chip.up{background:var(--goodbg);color:var(--good)}
.chip.down{background:var(--badbg);color:var(--bad)}
.chip.flat{background:#eef2f7;color:var(--mut)}
.hide{display:none}
/* keep charts compact — they scale to the column otherwise */
.card svg{display:block;max-width:330px;margin:0 auto}
.card.map svg{max-width:470px}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--nav);
 color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;
 transition:opacity .25s;pointer-events:none;z-index:99}
#toast.on{opacity:1}
</style>
</head>
<body>

<header>
  <h1>Digby Capsim Planner</h1>
  <span style="font-size:12px;opacity:.75">CP135726_1 &middot; Cost Leader / Product Lifecycle Focus</span>
  <span class="sp"></span>
  <button id="bSave">Save file</button>
  <button id="bLoad">Load file</button>
  <button id="bLink">Copy share link</button>
  <button id="bReset">Reset</button>
  <input type="file" id="fIn" accept=".json" class="hide">
</header>

<div class="rounds" id="rounds"></div>
<nav id="tabs"></nav>
<div class="wrap" id="body"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   DIGBY CAPSIM PLANNER — single file, no backend.

   MODEL HONESTY
     EXACT  positions, drift, age, corridor/overlap geometry, revenue, variable
            cost, contribution margin, utilisation, plant investment, P&L.
     EST    marked with a purple dot: awareness, accessibility, customer survey
            score, future segment demand. Editable on the Calibration tab.
     ABSENT material cost and R&D project cost/duration (formulas would not
            reproduce); balance sheet, equity, share count.
   ========================================================================== */
const NR=8, YR0=2027;
const R=r=>`R${r+1} · ${YR0+r}`;

const SEG=[
 {n:"Traditional",cp:5.7,cs:14.3,ox:0,oy:0,dp:.7,ds:-.7,age:2.0,mlo:14000,mhi:19000,
  plo:19.5,phi:29.5,w:{age:.47,price:.23,pos:.21,mtbf:.09},c:"#2563eb",u26:6156,g:.099},
 {n:"Low End",cp:3.0,cs:17.0,ox:-.8,oy:.8,dp:.5,ds:-.5,age:7.0,mlo:12000,mhi:17000,
  plo:14.5,phi:24.5,w:{price:.53,age:.24,pos:.16,mtbf:.07},c:"#059669",u26:7467,g:.126},
 {n:"High End",cp:8.4,cs:11.6,ox:1.4,oy:-1.4,dp:.9,ds:-.9,age:0,mlo:20000,mhi:25000,
  plo:29.5,phi:39.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#dc2626",u26:2128,g:.169},
 {n:"Performance",cp:9.0,cs:16.3,ox:1.4,oy:-1.0,dp:1.0,ds:-.7,age:1.0,mlo:22000,mhi:27000,
  plo:24.5,phi:34.5,w:{mtbf:.43,pos:.29,price:.19,age:.09},c:"#d97706",u26:1596,g:.209},
 {n:"Size",cp:3.7,cs:11.0,ox:1.0,oy:-1.4,dp:.7,ds:-1.0,age:1.5,mlo:16000,mhi:21000,
  plo:24.5,phi:34.5,w:{pos:.43,age:.29,mtbf:.19,price:.09},c:"#7c3aed",u26:1653,g:.190}
];
const PD=-0.50;
const centreAt=(i,r)=>({p:+(SEG[i].cp+SEG[i].dp*r).toFixed(2),s:+(SEG[i].cs+SEG[i].ds*r).toFixed(2)});
const idealAt=(i,r)=>{const c=centreAt(i,r);return{p:+(c.p+SEG[i].ox).toFixed(2),s:+(c.s+SEG[i].oy).toFixed(2)};};
const priceLo=(i,r)=>SEG[i].plo+PD*r, priceHi=(i,r)=>SEG[i].phi+PD*r;
const dist=(a,b,c,d)=>Math.hypot(a-c,b-d);

const DEF_CAL={laborBase:13.68,laborSlope:1.2467,shiftPremium:.5,capCost:6,autoCost:4,
 awarenessKeep:.667,accessKeep:.667,awareMax:.87,awareHalf:1400,accessMax:.85,accessHalf:1700,
 taxRate:.35,depYears:15,interestLT:.125,interestST:.1025,stockFee:.05,bondFee:.015};
/* Opening balances, derived from the Round 0 Courier's Selected Financial Statistics:
   assets = sales / asset turnover = 101,073 / 1.05 = 96,260
   equity = assets / leverage      = 96,260 / 2.01  = 47,891
   Long-term debt, cash, shares and price are placeholders — correct them from
   your Balance Sheet on the Finance screen. */
const DEF_OPEN={assets:96260,equity:47891,ltDebt:30000,cash:3500,shares:2000,price:34.00};

function seed(){
 const P=[
  {n:"Daze",seg:0,sp:5.5,ss:14.5,sm:17500,sa:3.1,r1:[5.7,14.3,14000,"2027-05-09"],m0:11.59,
   m1:10.43,m2:9.25,pr:26.5,pm:1500,sl:1600,fc:1360,cap:1800,au:4.5,sc:1380,inv:404},
  {n:"Dell",seg:1,sp:3.0,ss:17.0,sm:14000,sa:4.6,r1:[3.0,17.0,12000,"2027-01-30"],m0:7.81,
   m1:6.75,m2:6.05,pr:19.5,pm:1500,sl:1425,fc:1750,cap:1400,au:5.7,sc:1750,inv:0},
  {n:"Duck",seg:2,sp:8.0,ss:12.0,sm:23000,sa:1.7,r1:[8.9,10.8,25000,"2028-01-01"],m0:15.98,
   m1:15.23,m2:15.79,pr:39.5,pm:1500,sl:1425,fc:500,cap:600,au:3.0,sc:500,inv:0},
  {n:"Dot",seg:3,sp:9.4,ss:15.5,sm:25000,sa:2.5,r1:[9.4,14.0,24100,"2027-11-30"],m0:15.87,
   m1:15.22,m2:14.41,pr:33.0,pm:1500,sl:1425,fc:420,cap:600,au:3.0,sc:420,inv:0},
  {n:"Dune",seg:4,sp:4.0,ss:11.0,sm:19000,sa:2.6,r1:[5.0,11.0,18000,"2027-08-02"],m0:13.62,
   m1:12.97,m2:12.00,pr:31.5,pm:1500,sl:1425,fc:400,cap:600,au:3.0,sc:400,inv:0}];
 return {round:1,cal:{...DEF_CAL},open:{...DEF_OPEN},
  products:P.map(o=>({name:o.n,seg:o.seg,launch:0,added:false,sp:o.sp,ss:o.ss,sm:o.sm,sa:o.sa,m0:o.m0,
   rounds:Array.from({length:NR},(_,r)=>({
    p:o.r1[0],s:o.r1[1],m:o.r1[2],date:r===0?o.r1[3]:"",
    price:+(o.pr+(r>1?PD*(r-1):0)).toFixed(2),promo:o.pm,sales:o.sl,fc:o.fc,
    cap:o.cap,auto:o.au,sched:o.sc,inv:r===1?o.inv:0,
    mat:r===0?o.m1:o.m2, aware:r===1?.72:.5, access:r===1?.68:.5}))})),
  fin:Array.from({length:NR},()=>({stockI:0,stockR:0,bondI:0,bondR:0,div:0,curDebt:0}))};
}
let S=load()||seed(), tab=0, sel=0;
if(!S.open) S.open={...DEF_OPEN};
S.cal={...DEF_CAL,...(S.cal||{})};
const O={corridor:true,trails:false};

function save(){try{localStorage.setItem("digbyCapsim",JSON.stringify(S));}catch(e){}}
function load(){
 const h=location.hash.match(/#d=(.+)$/);
 if(h){try{const o=JSON.parse(decodeURIComponent(escape(atob(h[1]))));if(o&&o.products)return o;}catch(e){}}
 try{const t=localStorage.getItem("digbyCapsim");if(t)return JSON.parse(t);}catch(e){}
 return null;}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");
 setTimeout(()=>t.classList.remove("on"),1900);}

/* ---------------- model (validated against the live board) --------------- */
const DAYMS=864e5;
function revFrac(pi,r){const c=S.products[pi].rounds[r];if(!c.date)return 0;
 const t=Date.parse(c.date+"T00:00:00Z");if(isNaN(t))return 0;
 return (t-Date.UTC(YR0+r,0,1))/(365*DAYMS);}
function posChanged(pi,r){const P=S.products[pi],c=P.rounds[r];
 const pp=r===0?P.sp:P.rounds[r-1].p, ps=r===0?P.ss:P.rounds[r-1].s;
 return Math.abs(c.p-pp)>1e-9||Math.abs(c.s-ps)>1e-9;}
function ageInfo(pi){
 const P=S.products[pi],end=[],start=[];let prev=P.sa;
 for(let r=0;r<NR;r++){
  if(r<P.launch){end.push(null);start.push(null);continue;}
  start.push(prev);
  const f=posChanged(pi,r)?revFrac(pi,r):0;
  if(r===P.launch&&P.launch>0){const e=(f>0&&f<1)?1-f:1;end.push(e);prev=e;continue;}
  let e,nx;
  if(f<=0){e=prev+1;nx=e;}else if(f<1){e=(prev+f)/2+(1-f);nx=e;}else{e=prev+1;nx=(prev+f)/2;}
  end.push(e);prev=nx;}
 return {end,start};}
const ages=pi=>ageInfo(pi).end;
const laborUnit=(a,sh)=>Math.max(0,S.cal.laborBase-S.cal.laborSlope*a)*(1+S.cal.shiftPremium*(sh||0));
const shiftPct=(sc,cap)=>cap>0?Math.max(0,Math.min(1,(sc-cap)/cap)):0;
const awareGain=b=>S.cal.awareMax*(1-Math.pow(2,-b/S.cal.awareHalf));
const accessGain=b=>S.cal.accessMax*(1-Math.pow(2,-b/S.cal.accessHalf));
function awareness(pi,r){const c=S.products[pi].rounds[r];
 const prev=r>0?awareness(pi,r-1):(c.aware||0);
 return Math.min(1,prev*S.cal.awarenessKeep+awareGain(c.promo));}
function accessibility(pi,r){const c=S.products[pi].rounds[r];
 const prev=r>0?accessibility(pi,r-1):(c.access||0);
 return Math.min(1,prev*S.cal.accessKeep+accessGain(c.sales));}
function survey(pi,r,si){
 const c=S.products[pi].rounds[r],g=SEG[si],id=idealAt(si,r),cen=centreAt(si,r);
 if(dist(c.p,c.s,cen.p,cen.s)>4)return 0;
 const pos=Math.max(0,1-dist(c.p,c.s,id.p,id.s)/4);
 const lo=priceLo(si,r),hi=priceHi(si,r);
 const price=c.price<=lo?1:c.price>=hi?0:(hi-c.price)/(hi-lo);
 const A=ages(pi)[r]||0;
 const age=Math.max(0,1-Math.abs(A-g.age)/Math.max(1.5,g.age||1.5));
 const mt=c.m<g.mlo||c.m>g.mhi?0:.5+.5*((c.m-g.mlo)/(g.mhi-g.mlo));
 const w=g.w;
 return 100*((w.pos||0)*pos+(w.price||0)*price+(w.age||0)*age+(w.mtbf||0)*mt);}
const segDemand=(si,r)=>Math.round(SEG[si].u26*Math.pow(1+SEG[si].g,r+1));
const units=(pi,r)=>S.products[pi].rounds[r].fc||0;
const varCost=(pi,r)=>{const c=S.products[pi].rounds[r];
 return (c.mat||0)+laborUnit(c.auto,shiftPct(c.sched,c.cap));};
function plantInvest(pi,r){const c=S.products[pi].rounds[r],pc=r>0?S.products[pi].rounds[r-1]:c;
 return Math.max(0,(c.cap||0)-(pc.cap||0))*(S.cal.capCost+S.cal.autoCost*(c.auto||0))
      + Math.max(0,(c.auto||0)-(pc.auto||0))*S.cal.autoCost*(pc.cap||0);}
/* Balance sheet is carried forward round by round from the opening balances you
   enter, so every financing slider moves something: bonds change interest and
   leverage, stock changes equity and share count, dividends drain equity.
   Assets are approximated as equity + long-term debt + current debt. */
function balances(){
 const o=S.open,out=[];
 let eq=o.equity, lt=o.ltDebt, sh=o.shares;
 for(let r=0;r<NR;r++){
  const f=S.fin[r]||{};
  lt = lt + (f.bondI||0) - (f.bondR||0);
  const shNew = o.price>0 ? ((f.stockI||0)-(f.stockR||0))/o.price : 0;
  sh = Math.max(1, sh + shNew);
  const p = pnlRaw(r, lt, f);
  const divTot = (f.div||0)*sh;
  eq = eq + p.net - divTot
       + (f.stockI||0)*(1-S.cal.stockFee) - (f.stockR||0);
  const assets = eq + lt + (f.curDebt||0);
  out.push({lt,eq:Math.max(1,eq),sh,assets:Math.max(1,assets),divTot,
   roe:p.net/Math.max(1,eq), roa:p.net/Math.max(1,assets),
   lev:assets/Math.max(1,eq), at:p.rev/Math.max(1,assets)});
 }
 return out;}
function pnlRaw(r,ltDebt,f){
 let rev=0,vc=0,fx=0,inv=0;
 S.products.forEach((P,i)=>{if(r<P.launch)return;const c=P.rounds[r],u=units(i,r);
  rev+=u*c.price;vc+=u*varCost(i,r);
  fx+=(c.promo||0)+(c.sales||0)+((c.cap||0)*(S.cal.capCost+S.cal.autoCost*(c.auto||0)))/S.cal.depYears;
  inv+=plantInvest(i,r);});
 const cm=rev-vc,ebit=cm-fx;
 const int=(f.curDebt||0)*S.cal.interestST + (ltDebt||0)*S.cal.interestLT;
 const fee=(f.bondR||0)*S.cal.bondFee + (f.stockI||0)*S.cal.stockFee;
 const pre=ebit-int-fee,tax=Math.max(0,pre)*S.cal.taxRate,net=pre-tax;
 return {rev,vc,cm,fx,ebit,int,fee,pre,tax,net,inv,cmPct:rev>0?cm/rev:0,ros:rev>0?net/rev:0};}
function pnl(r){
 let lt=S.open.ltDebt;
 for(let k=0;k<=r;k++){const f=S.fin[k]||{};lt=lt+(f.bondI||0)-(f.bondR||0);}
 return pnlRaw(r,lt,S.fin[r]||{});}
const money=v=>v<0?"($"+Math.abs(Math.round(v)).toLocaleString()+")":"$"+Math.round(v).toLocaleString();
const pct=v=>(100*v).toFixed(1)+"%";
const EST='<span class="estmark" title="Estimated — calibrate on the Calibration tab">&bull;</span>';

/* ---------------- charts (inline SVG, no libraries) ---------------------- */
function axes(w,h,pad,maxV,ticks,fmt){
 let g=`<line x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}" stroke="#c3ccd6"/>`;
 for(let i=0;i<=ticks;i++){
  const v=maxV*i/ticks, y=h-pad.b-(h-pad.b-pad.t)*i/ticks;
  g+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eef2f7"/>
      <text x="${pad.l-6}" y="${y+3.5}" font-size="9.5" fill="#94a3b8" text-anchor="end">${fmt(v)}</text>`;}
 return g;}
/* grouped vertical bars: items=[{label,newV,oldV}] */
function vbars(items,opt){
 const w=opt.w||300,h=opt.h||118,pad={l:opt.l||34,r:6,t:9,b:20};
 const maxV=opt.max||Math.max(...items.flatMap(i=>[i.newV,i.oldV||0]))*1.15||1;
 const bw=(w-pad.l-pad.r)/items.length, gw=Math.min(22,bw*.32);
 let g=axes(w,h,pad,maxV,4,opt.fmt||(v=>v.toFixed(0)));
 items.forEach((it,k)=>{
  const cx=pad.l+bw*(k+.5), H=h-pad.b-pad.t;
  const bh=v=>Math.max(0,(v/maxV)*H);
  if(it.oldV!==undefined){
   g+=`<rect x="${cx+1}" y="${h-pad.b-bh(it.oldV)}" width="${gw}" height="${bh(it.oldV)}" fill="${opt.oldC||"#3f4550"}"/>`;
   g+=`<rect x="${cx-gw-1}" y="${h-pad.b-bh(it.newV)}" width="${gw}" height="${bh(it.newV)}" fill="${it.c||opt.newC||"#5b9bd5"}"/>`;
  }else{
   g+=`<rect x="${cx-gw/2}" y="${h-pad.b-bh(it.newV)}" width="${gw}" height="${bh(it.newV)}" fill="${it.c||opt.newC||"#5b9bd5"}"/>`;
   g+=`<text x="${cx}" y="${h-pad.b-bh(it.newV)-4}" font-size="9.5" font-weight="700" fill="#334155"
        text-anchor="middle">${(opt.fmt||(v=>v.toFixed(0)))(it.newV)}</text>`;}
  g+=`<text x="${cx}" y="${h-pad.b+13}" font-size="10" fill="#475569" text-anchor="middle">${it.label}</text>`;});
 return `<svg viewBox="0 0 ${w} ${h}" width="100%">${g}</svg>`;}
/* grouped horizontal bars: items=[{label,newV,oldV}] */
function hbars(items,opt){
 const w=opt.w||300,rowH=opt.rowH||22,pad={l:opt.l||42,r:40,t:5,b:8};
 const h=pad.t+pad.b+items.length*rowH;
 const maxV=opt.max||Math.max(...items.flatMap(i=>[i.newV,i.oldV||0]))*1.12||1;
 const IW=w-pad.l-pad.r;
 let g="";
 items.forEach((it,k)=>{
  const y=pad.t+rowH*k, bw=v=>Math.max(0,(v/maxV)*IW);
  g+=`<rect x="${pad.l}" y="${y+2}" width="${bw(it.newV)}" height="7.5" fill="${opt.newC||"#5b9bd5"}"/>
      <text x="${pad.l+bw(it.newV)+3}" y="${y+9}" font-size="8.5" font-weight="700"
       fill="#334155">${(opt.fmt||(v=>"$"+v.toFixed(2)))(it.newV)}</text>`;
  if(it.oldV!==undefined)
   g+=`<rect x="${pad.l}" y="${y+11}" width="${bw(it.oldV)}" height="7.5" fill="${opt.oldC||"#3f4550"}"/>
       <text x="${pad.l+bw(it.oldV)+3}" y="${y+18}" font-size="8.5"
        fill="#64748b">${(opt.fmt||(v=>"$"+v.toFixed(2)))(it.oldV)}</text>`;
  g+=`<text x="${pad.l-5}" y="${y+12}" font-size="9.5" font-weight="600" fill="#475569"
       text-anchor="end">${it.label}</text>`;});
 return `<svg viewBox="0 0 ${w} ${h}" width="100%">${g}</svg>`;}
/* age profile: old -> new connected, mirrors the sim's chart */
function ageChart(r){
 const w=300,h=132,pad={l:30,r:8,t:9,b:20};
 const pts=S.products.map((P,i)=>{const a=ageInfo(i);return {n:P.name,o:a.start[r],e:a.end[r],c:SEG[P.seg].c};})
   .filter(o=>o.o!=null);
 const maxV=Math.max(4,...pts.flatMap(o=>[o.o,o.e]))*1.12;
 let g=axes(w,h,pad,maxV,4,v=>v.toFixed(1));
 const bw=(w-pad.l-pad.r)/Math.max(1,pts.length), H=h-pad.b-pad.t;
 const Y=v=>h-pad.b-(v/maxV)*H;
 pts.forEach((o,k)=>{
  const x1=pad.l+bw*(k+.32), x2=pad.l+bw*(k+.68);
  g+=`<line x1="${x1}" y1="${Y(o.o)}" x2="${x2}" y2="${Y(o.e)}" stroke="${o.c}" stroke-width="1.8"/>
      <circle cx="${x1}" cy="${Y(o.o)}" r="3.2" fill="#fff" stroke="${o.c}" stroke-width="1.8"/>
      <circle cx="${x2}" cy="${Y(o.e)}" r="3.6" fill="${o.c}"/>
      <text x="${pad.l+bw*(k+.5)}" y="${h-pad.b+12}" font-size="9.5" fill="#475569"
       text-anchor="middle">${o.n}</text>`;});
 // segment age targets as dashed guides
 SEG.forEach(s=>{g+=`<line x1="${pad.l}" y1="${Y(s.age)}" x2="${w-pad.r}" y2="${Y(s.age)}"
   stroke="${s.c}" stroke-dasharray="2 3" opacity=".45"/>`;});
 return `<svg viewBox="0 0 ${w} ${h}" width="100%">${g}</svg>`;}

/* ---------------- perceptual map ---------------------------------------- */
const M=50,W=560,IN=W-M*2;
const X=v=>M+(v/20)*IN, Y=v=>M+(1-v/20)*IN, RAD=u=>(u/20)*IN;
const RT2=Math.SQRT2, RFI=2.5/RT2, RGH=4/RT2;
function zones(r){const P=i=>SEG[i].cp+SEG[i].dp*r;
 const pair=(a,b)=>{const lo=P(a),hi=P(b),gap=(hi-lo)*RT2;
  const rl=hi-RGH,rh=lo+RGH,fl=hi-RFI,fh=lo+RFI,mid=(lo+hi)/2;
  return{a:SEG[a].n,b:SEG[b].n,gap,rough:rh>rl?[rl,rh]:null,fine:fh>fl?[fl,fh]:null,mid,midS:20-mid,md:gap/2};};
 return [pair(1,0),pair(0,2)];}
function mapSVG(r){
 let g=`<defs><radialGradient id="sg" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="#9fc5e8" stop-opacity=".92"/>
  <stop offset="62%" stop-color="#7fb1de" stop-opacity=".8"/>
  <stop offset="100%" stop-color="#5b9bd5" stop-opacity=".55"/></radialGradient></defs>
  <rect x="${M}" y="${M}" width="${IN}" height="${IN}" fill="#fff" stroke="#9aa7b5"/>`;
 for(let v=0;v<=20;v+=2)
  g+=`<line x1="${X(v)}" y1="${M}" x2="${X(v)}" y2="${M+IN}" stroke="#d7dee6"/>
      <line x1="${M}" y1="${Y(v)}" x2="${M+IN}" y2="${Y(v)}" stroke="#d7dee6"/>
      <text x="${X(v)}" y="${M+IN+15}" font-size="9.5" fill="#94a3b8" text-anchor="middle">${v}</text>
      <text x="${M-8}" y="${Y(v)+3}" font-size="9.5" fill="#94a3b8" text-anchor="end">${v}</text>`;
 g+=`<text x="${M+IN/2}" y="${M+IN+34}" font-size="11" fill="#64748b" text-anchor="middle">Performance</text>
     <text x="14" y="${M+IN/2}" font-size="11" fill="#64748b" text-anchor="middle"
      transform="rotate(-90 14 ${M+IN/2})">Size</text>`;
 if(O.corridor){
  g+=`<line x1="${X(0)}" y1="${Y(20)}" x2="${X(20)}" y2="${Y(0)}" stroke="#0f172a"
       stroke-width="1.6" stroke-dasharray="7 5" opacity=".55"/>`;
  zones(r).forEach(z=>{
   if(z.rough)g+=`<line x1="${X(z.rough[0])}" y1="${Y(20-z.rough[0])}" x2="${X(z.rough[1])}"
     y2="${Y(20-z.rough[1])}" stroke="#f59e0b" stroke-width="9" opacity=".33" stroke-linecap="round"/>`;
   if(z.fine)g+=`<line x1="${X(z.fine[0])}" y1="${Y(20-z.fine[0])}" x2="${X(z.fine[1])}"
     y2="${Y(20-z.fine[1])}" stroke="#16a34a" stroke-width="9" opacity=".75" stroke-linecap="round"/>`;});}
 SEG.forEach((s,i)=>{
  if(O.trails){let pts=[];for(let k=0;k<NR;k++){const q=centreAt(i,k);pts.push(`${X(q.p)},${Y(q.s)}`);}
   g+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${s.c}" stroke-width="1"
        stroke-dasharray="3 3" opacity=".45"/>`;}
  const q=centreAt(i,r);
  g+=`<circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RAD(4)}" fill="none" stroke="#7a7a7a" stroke-width="1.1"/>
      <circle cx="${X(q.p)}" cy="${Y(q.s)}" r="${RAD(2.5)}" fill="url(#sg)" stroke="#5b9bd5"/>
      <circle cx="${X(q.p)}" cy="${Y(q.s)}" r="3.2" fill="#111"/>`;});
 SEG.forEach((s,i)=>{const q=centreAt(i,r),d=idealAt(i,r);
  if(s.ox||s.oy)g+=`<line x1="${X(q.p)}" y1="${Y(q.s)}" x2="${X(d.p)}" y2="${Y(d.s)}"
    stroke="${s.c}" stroke-width="1" opacity=".7"/>`;
  g+=`<path d="M${X(d.p)-4.5},${Y(d.s)} h9 M${X(d.p)},${Y(d.s)-4.5} v9" stroke="${s.c}"
       stroke-width="2" stroke-linecap="round"/>
      <text x="${X(q.p)}" y="${Y(q.s)-RAD(2.5)-6}" font-size="10.5" font-weight="700" fill="${s.c}"
       text-anchor="middle" paint-order="stroke" stroke="#fff" stroke-width="3"
       stroke-linejoin="round">${s.n}</text>`;});
 S.products.forEach((P,i)=>{if(r<P.launch)return;const c=P.rounds[r];
  const on=i===sel;
  g+=`<rect x="${X(c.p)-(on?5.5:4.2)}" y="${Y(c.s)-(on?5.5:4.2)}" width="${on?11:8.4}"
       height="${on?11:8.4}" fill="${P.added?"#fff":"#111"}" stroke="${on?"#f59e0b":"#111"}"
       stroke-width="${on?2.6:1.6}"/>
      <text x="${X(c.p)+9}" y="${Y(c.s)+4}" font-size="11" font-weight="700" fill="#111"
       paint-order="stroke" stroke="#fff" stroke-width="3" stroke-linejoin="round">${P.name}</text>`;});
 return `<svg viewBox="0 0 560 560" width="100%">${g}</svg>`;}

/* ---------------- UI helpers -------------------------------------------- */
function ptabs(){
 return `<div class="ptabs">`+S.products.map((P,i)=>
  `<button data-sel="${i}" class="${i===sel?'on':''}">${P.name}</button>`).join("")+
  `<button data-sel="add" style="flex:0 0 90px">+ Add</button></div>`;}
/* mk = {band:[lo,hi,colour,label], ticks:[[value,colour,label],...]}
   Bands and ticks are drawn on the track so the acceptable range and the target
   are visible while you drag, rather than something you have to look up. */
function sld(f,label,sub,v,min,max,step,fmt,mk){
 const pos=x=>Math.max(0,Math.min(100,((x-min)/(max-min))*100));
 let ov="";
 if(mk&&mk.band){const[a,b,col,lb]=mk.band;
  ov+=`<div class="band" style="left:${pos(a)}%;width:${pos(b)-pos(a)}%;background:${col}"></div>`;
  if(lb)ov+=`<div class="tlab" style="left:${(pos(a)+pos(b))/2}%;color:${col};top:-9px">${lb}</div>`;}
 (mk&&mk.ticks||[]).forEach(([x,col,lb])=>{
  ov+=`<div class="tick" style="left:calc(${pos(x)}% - 1px);background:${col}"></div>`;
  if(lb)ov+=`<div class="tlab" style="left:${pos(x)}%;color:${col};top:-9px">${lb}</div>`;});
 return `<div class="sld"><div class="lab">${label}<small>${sub||""}</small></div>
  <div class="track"><span class="mm">${fmt?fmt(min):min}</span>
   <div class="tw"><div class="base"></div>${ov}
    <input type="range" min="${min}" max="${max}" step="${step}" value="${v}" data-f="${f}"></div>
   <input class="bub" type="number" min="${min}" max="${max}" step="${step}" value="${v}" data-f="${f}">
   <span class="mm">${fmt?fmt(max):max}</span></div></div>`;}
/* delta chip vs the previous round */
function dlt(cur,prev,fmt,goodUp){
 if(prev===undefined||prev===null||!isFinite(prev))return"";
 const d=cur-prev; if(Math.abs(d)<1e-9)return`<span class="chip flat">no change</span>`;
 const good=goodUp?d>0:d<0;
 return `<span class="chip ${good?'up':'down'}">${d>0?"▲":"▼"} ${fmt(Math.abs(d))}</span>`;}
const $m=v=>"$"+(+v).toFixed(2), $k=v=>"$"+(+v).toLocaleString();

 return h+`</table></div>`;}

  on your forecast.</div></div>`;}

function tProd(r){
 const P=S.products[sel],c=P.rounds[r],sh=shiftPct(c.sched,c.cap),lab=laborUnit(c.auto,sh);
 const vc=(c.mat||0)+lab,cm=c.price>0?(c.price-vc)/c.price:0,util=c.cap>0?c.sched/c.cap:0;
 let h=`<div class="row"><div class="col"><div class="card"><h2>Production — ${R(r)}</h2>${ptabs()}
  ${sld("sched","Production schedule","green = first shift; amber = second shift",c.sched,0,3600,10,
    v=>(+v).toLocaleString(),
    {band:[0,Math.min(3600,c.cap),"rgba(22,163,74,.3)"],
     ticks:[[Math.min(3600,c.cap),"#d97706","2nd shift"],
            [Math.min(3600,c.cap*2),"#dc2626","max"],
            [Math.min(3600,Math.max(0,(c.fc||0)-(c.inv||0))),"#2563eb","meets forecast"]]})}
  ${sld("cap","Capacity","units per shift; tick = what you're scheduling",c.cap,0,6000,50,
    v=>(+v).toLocaleString(),{ticks:[[Math.min(6000,c.sched),"#2563eb","schedule"]]})}
  ${sld("auto","Automation","higher = cheaper labour, slower to reposition",c.auto,1,10,.5,null,
    {ticks:[[c.auto,"transparent",""]]})}
  ${sld("inv","Inventory on hand","carried in from last round",c.inv,0,2000,10,v=>(+v).toLocaleString())}
  ${sld("mat","Material cost / unit","read this off the Capsim R&D screen",c.mat,0,25,.01,$m)}
  <table style="margin-top:12px"><tr><th>Utilisation</th><th>2nd shift</th><th>Labour $</th>
   <th>Material $</th><th>Var cost</th><th>Contribution</th><th>Plant $K</th></tr>
   <tr><td class="num" style="color:${util>2?'var(--bad)':util>1?'var(--warn)':'inherit'}">${pct(util)}</td>
   <td class="num">${pct(sh)}</td><td class="num">${$m(lab)}</td><td class="num">${$m(c.mat||0)}</td>
   <td class="num">${$m(vc)}</td>
   <td class="num" style="font-weight:700;color:${cm<.3?'var(--warn)':'var(--good)'}">${pct(cm)}</td>
   <td class="num">${plantInvest(sel,r)?money(plantInvest(sel,r)):"—"}</td></tr></table></div></div>
  <div class="col"><div class="card"><h2>Contribution margin by product</h2>
   ${vbars(S.products.map((P2,i)=>{const c2=P2.rounds[r];
     const v=c2.price>0?((c2.price-varCost(i,r))/c2.price)*100:0;
     return {label:P2.name,newV:v,c:SEG[P2.seg].c};}),{max:60,fmt:v=>v.toFixed(0)+"%"})}
   <div class="note">A cost leader should be pushing these up every round. Below 30% is a warning sign.</div></div>
   <div class="card"><h2>Cost stack per unit</h2>
   ${hbars(S.products.map((P2,i)=>{const c2=P2.rounds[r];
     return {label:P2.name,newV:varCost(i,r),oldV:c2.price};}),
     {w:340,newC:"#dc2626",oldC:"#94a3b8"})}
   <div class="legend"><span><i class="sw" style="background:#dc2626"></i>variable cost</span>
    <span><i class="sw" style="background:#94a3b8"></i>price</span></div></div>
  </div></div>
  <div class="card"><h2>Portfolio &amp; warnings — ${R(r)}</h2><table>
  <tr><th class="l">Product</th><th>Capacity</th><th>Auto</th><th>Schedule</th><th>Util</th>
  <th>2nd shift</th><th>Labour</th><th>Material</th><th>Var cost</th><th>CM%</th><th>Plant $K</th></tr>`;
 let tot=0;
 S.products.forEach((P2,i)=>{if(r<P2.launch)return;const c2=P2.rounds[r];
  const s2=shiftPct(c2.sched,c2.cap),l2=laborUnit(c2.auto,s2),v2=(c2.mat||0)+l2;
  const m2=c2.price>0?(c2.price-v2)/c2.price:0,pi2=plantInvest(i,r);tot+=pi2;
  h+=`<tr class="${i===sel?'hi':''}"><td class="name">${P2.name}</td>
   <td class="num">${c2.cap.toLocaleString()}</td><td class="num">${c2.auto}</td>
   <td class="num">${c2.sched.toLocaleString()}</td>
   <td class="num">${pct(c2.cap?c2.sched/c2.cap:0)}</td><td class="num">${pct(s2)}</td>
   <td class="num">${$m(l2)}</td><td class="num">${$m(c2.mat||0)}</td><td class="num">${$m(v2)}</td>
   <td class="num"><b>${pct(m2)}</b></td><td class="num">${pi2?money(pi2):"—"}</td></tr>`;});
 h+=`<tr class="tot"><td class="l">Total</td><td colspan="9"></td><td class="num">${money(tot)}</td></tr></table>`;
 const fl=[];
 S.products.forEach((P2,i)=>{if(r<P2.launch)return;const c2=P2.rounds[r],s2=SEG[P2.seg];
  if(c2.cap>0&&c2.sched/c2.cap>2)fl.push(`<div class="flag e">${P2.name}: schedule ${c2.sched.toLocaleString()}
   exceeds twice capacity — the most you can build is ${(c2.cap*2).toLocaleString()}.</div>`);
  else if(c2.cap>0&&c2.sched/c2.cap>1)fl.push(`<div class="flag w">${P2.name}: second shift at
   ${pct(shiftPct(c2.sched,c2.cap))} — those units cost ${pct(S.cal.shiftPremium)} more in labour.</div>`);
  if(c2.m<s2.mlo||c2.m>s2.mhi)fl.push(`<div class="flag w">${P2.name}: MTBF ${c2.m.toLocaleString()}
   is outside ${s2.n}'s ${s2.mlo.toLocaleString()}–${s2.mhi.toLocaleString()} band.</div>`);});
 h+=fl.length?fl.join(""):'<div class="flag o">No capacity or reliability violations this round.</div>';
 return h+`<div class="note">Labour $/unit = ${S.cal.laborBase} − ${S.cal.laborSlope} × automation,
  fitted to your Round 2 board and reproducing it exactly. Adjust on Calibration if the sim diverges.</div></div>`;}

function tFin(r){
 const p=pnl(r),f=S.fin[r],B=balances(),b=B[r],pb=r>0?B[r-1]:null,pp=r>0?pnl(r-1):null;
 const fs=(k,l,sub,max,step,mk)=>{
  const pos=x=>Math.max(0,Math.min(100,(x/max)*100));
  let ov="";(mk||[]).forEach(([x,col,lb])=>{
   ov+=`<div class="tick" style="left:calc(${pos(x)}% - 1px);background:${col}"></div>`;
   if(lb)ov+=`<div class="tlab" style="left:${pos(x)}%;color:${col};top:-9px">${lb}</div>`;});
  return `<div class="sld"><div class="lab">${l}<small>${sub}</small></div>
  <div class="track"><span class="mm">0</span>
   <div class="tw"><div class="base"></div>${ov}
    <input type="range" min="0" max="${max}" step="${step}" value="${f[k]}" data-fin="${k}"></div>
   <input class="bub" type="number" min="0" max="${max}" step="${step}" value="${f[k]}" data-fin="${k}">
   <span class="mm">${max.toLocaleString()}</span></div></div>`;};
 const o=S.open;
 const ob=(k,l)=>`<div class="sld" style="grid-template-columns:150px 1fr"><div class="lab">${l}</div>
  <div class="track"><input class="bub" style="width:110px" type="number" step="1"
   value="${o[k]}" data-open="${k}"></div></div>`;
 return `<div class="kpi">
  <div><b>${money(p.rev)}</b><span>Revenue</span></div>
  <div><b>${money(p.net)}</b>${dlt(p.net,pp?pp.net:null,v=>money(v),true)}<span>Net profit</span></div>
  <div><b>${pct(b.roe)}</b>${dlt(b.roe,pb?pb.roe:null,v=>pct(v),true)}<span>ROE</span></div>
  <div><b>${pct(p.ros)}</b><span>ROS</span></div>
  <div><b>${pct(b.roa)}</b><span>ROA</span></div>
  <div><b>${b.lev.toFixed(2)}</b><span>Leverage</span></div>
  <div><b>${b.at.toFixed(2)}</b><span>Asset turnover</span></div>
  <div><b>${money(p.int)}</b><span>Interest</span></div></div>
  <div class="row"><div class="col"><div class="card"><h2>Financing decisions — ${R(r)} (000s)</h2>
  ${fs("bondI","Bond issue","long-term debt at "+pct(S.cal.interestLT),40000,100,
    [[b.lt,"#dc2626","current LT debt"]])}
  ${fs("bondR","Bond retire",pct(S.cal.bondFee)+" fee to retire early",40000,100,
    [[b.lt,"#dc2626","LT debt"]])}
  ${fs("curDebt","Current debt","short-term at "+pct(S.cal.interestST),40000,100)}
  ${fs("stockI","Stock issue",pct(S.cal.stockFee)+" brokerage fee, dilutes shares",20000,100)}
  ${fs("stockR","Stock retire","buys shares back out of equity",20000,100)}
  ${fs("div","Dividend per share","× "+Math.round(b.sh).toLocaleString()+"K shares = "
    +money(b.divTot)+" out of equity",10,.1)}
  <div class="note">Every slider now moves the statements: bonds change interest and leverage,
   stock changes equity and share count, dividends drain equity.</div></div>
  <div class="card"><h2>Opening balances — start of Round 1 (000s)</h2>
   <p class="sub">Everything above carries forward from these. Assets and equity are derived from
    the Round 0 Courier; the rest are placeholders — correct them from your Balance Sheet.</p>
   ${ob("equity","Equity")}${ob("ltDebt","Long-term debt")}${ob("assets","Total assets")}
   ${ob("shares","Shares outstanding (000s)")}${ob("price","Share price $")}${ob("cash","Cash")}
  </div></div>
  <div class="col"><div class="card"><h2>Income statement — ${R(r)} (000s)</h2><table>
  <tr><th class="l">Line</th><th>Amount</th><th class="l">Basis</th></tr>
  <tr><td class="l">Sales</td><td class="num">${money(p.rev)}</td><td class="l" style="color:var(--mut)">units × price</td></tr>
  <tr><td class="l">Variable costs</td><td class="num">${money(-p.vc)}</td><td class="l" style="color:var(--mut)">units × (material + labour)</td></tr>
  <tr class="tot"><td class="l">Contribution margin</td><td class="num">${money(p.cm)}</td><td class="l" style="color:var(--mut)">${pct(p.cmPct)}</td></tr>
  <tr><td class="l">Period costs</td><td class="num">${money(-p.fx)}</td><td class="l" style="color:var(--mut)">promo + sales + depreciation</td></tr>
  <tr><td class="l"><b>EBIT</b></td><td class="num"><b>${money(p.ebit)}</b></td><td></td></tr>
  <tr><td class="l">Interest</td><td class="num">${money(-p.int)}</td><td class="l" style="color:var(--mut)">LT ${money(b.lt)} @ ${pct(S.cal.interestLT)} + ST @ ${pct(S.cal.interestST)}</td></tr>
  <tr><td class="l">Issue / retire fees</td><td class="num">${money(-p.fee)}</td><td class="l" style="color:var(--mut)">stock ${pct(S.cal.stockFee)}, bond ${pct(S.cal.bondFee)}</td></tr>
  <tr><td class="l">Taxes</td><td class="num">${money(-p.tax)}</td><td class="l" style="color:var(--mut)">${pct(S.cal.taxRate)}</td></tr>
  <tr class="tot"><td class="l">Net profit</td><td class="num">${money(p.net)}</td><td></td></tr></table></div>
  <div class="card"><h2>Balance carried forward</h2><table>
  <tr><th class="l">Item</th><th>Start of round</th><th>End of round</th></tr>
  <tr><td class="l">Equity</td><td class="num">${pb?money(pb.eq):money(S.open.equity)}</td>
   <td class="num"><b>${money(b.eq)}</b>${dlt(b.eq,pb?pb.eq:S.open.equity,v=>money(v),true)}</td></tr>
  <tr><td class="l">Long-term debt</td><td class="num">${pb?money(pb.lt):money(S.open.ltDebt)}</td>
   <td class="num">${money(b.lt)}</td></tr>
  <tr><td class="l">Total assets (approx)</td><td class="num">${pb?money(pb.assets):money(S.open.assets)}</td>
   <td class="num">${money(b.assets)}</td></tr>
  <tr><td class="l">Shares (000s)</td><td class="num">${pb?Math.round(pb.sh).toLocaleString():S.open.shares.toLocaleString()}</td>
   <td class="num">${Math.round(b.sh).toLocaleString()}</td></tr></table>
  <div class="note"><b>Assets are approximated</b> as equity + long-term debt + current debt, so
   accounts payable and inventory are missing. ROA, leverage and asset turnover shift with that
   approximation. <b>Stock price is still not modelled</b> — Capsim's formula needs book value,
   EPS and dividend history together. Take it from the sim.</div></div>
  <div class="card"><h2>ROE and profit by round</h2>
  ${vbars(Array.from({length:NR},(_,k)=>({label:"R"+(k+1),newV:B[k].roe*100,
    c:B[k].roe<0?"#dc2626":"#166534"})),{fmt:v=>v.toFixed(0)+"%",l:40})}
  ${vbars(Array.from({length:NR},(_,k)=>({label:"R"+(k+1),newV:pnl(k).net/1000,
    c:pnl(k).net<0?"#dc2626":"#5b9bd5"})),{fmt:v=>"$"+v.toFixed(1)+"M",l:46})}</div>
  </div></div>`;}

function tScore(){
 let cum=0;
 let h=`<div class="card"><h2>Success measures</h2>
  <p class="sub">ROE, cumulative profit and stock price were your three. Cumulative profit is exact;
   ROE and stock price need equity and share count from the Finance screen.</p>
  <table><tr><th class="l">Round</th><th>Revenue</th><th>Contribution</th><th>Net profit</th>
  <th>Cumulative</th><th>ROS</th><th>Plant</th></tr>`;
 const cums=[];
 for(let r=0;r<NR;r++){const p=pnl(r);cum+=p.net;cums.push(cum);
  h+=`<tr class="${r===S.round?'hi':''}"><td class="name">${R(r)}</td>
   <td class="num">${money(p.rev)}</td><td class="num">${money(p.cm)}</td>
   <td class="num" style="color:${p.net<0?'var(--bad)':'inherit'}">${money(p.net)}</td>
   <td class="num"><b>${money(cum)}</b></td><td class="num">${pct(p.ros)}</td>
   <td class="num">${p.inv?money(p.inv):"—"}</td></tr>`;}
 h+=`</table></div>
  <div class="row"><div class="col"><div class="card"><h2>Cumulative profit</h2>
  ${vbars(cums.map((v,k)=>({label:"R"+(k+1),newV:v/1000,c:v<0?"#dc2626":"#166534"})),
    {fmt:v=>"$"+v.toFixed(0)+"M",l:52})}</div></div>
  <div class="col"><div class="card"><h2>Corridor discipline</h2>
  <p class="sub">Distance from Pfmn + Size = 20, where all three focus segments sit. Green means the
   product is on the lifecycle conveyor.</p><table>
  <tr><th class="l">Product</th>${Array.from({length:NR},(_,r)=>`<th>${r+1}</th>`).join("")}</tr>`;
 S.products.forEach((P,i)=>{h+=`<tr><td class="name">${P.name}</td>`;
  for(let r=0;r<NR;r++){
   if(r<P.launch){h+=`<td style="color:var(--mut)">—</td>`;continue;}
   const c=P.rounds[r],d=Math.abs(c.p+c.s-20)/RT2;
   h+=`<td><span class="pill ${d<=.5?'yes':d<=1.5?'rough':'no'}">${d.toFixed(1)}</span></td>`;}
  h+=`</tr>`;});
 return h+`</table></div></div></div>`;}

function tCal(){
 const C=S.cal,f=(k,l,st)=>`<tr><td class="l">${l}</td><td>
  <input class="bub" type="number" step="${st||.01}" value="${C[k]}" data-cal="${k}"></td></tr>`;
 return `<div class="card"><h2>Calibration</h2>
  <p class="sub">Everything marked ${EST} comes from these. As real results post, adjust until the
   model matches the sim.</p>
  <div class="row"><div class="col"><table><tr><th class="l" colspan="2">Production</th></tr>
  ${f("laborBase","Labour $/unit at automation 0")}${f("laborSlope","Labour saved per automation point")}
  ${f("shiftPremium","Second-shift premium")}${f("capCost","Capacity cost $/unit",.5)}
  ${f("autoCost","Automation $/point/unit",.5)}${f("depYears","Depreciation life (years)",1)}</table></div>
  <div class="col"><table><tr><th class="l" colspan="2">Marketing response ${EST}</th></tr>
  ${f("awareMax","Awareness ceiling")}${f("awareHalf","Promo $K for half ceiling",50)}
  ${f("awarenessKeep","Awareness kept each year")}${f("accessMax","Accessibility ceiling")}
  ${f("accessHalf","Sales $K for half ceiling",50)}${f("accessKeep","Accessibility kept each year")}</table></div>
  <div class="col"><table><tr><th class="l" colspan="2">Finance</th></tr>
  ${f("taxRate","Tax rate")}${f("interestST","Short-term interest")}
  ${f("interestLT","Long-term interest")}</table></div></div>
  <div class="note"><b>How to calibrate.</b> After a round posts, find the real awareness and
   accessibility in the Courier and adjust the ceiling and half-point until this app reproduces
   them. Labour is already fitted to your Round 2 board. <b>Material cost and R&amp;D project cost are
   deliberately absent</b> — those formulas would not reproduce, and a wrong formula is worse than none.
   Re-share the file after calibrating so the team inherits it.</div></div>`;}

/* ---------------- render / events --------------------------------------- */
const TABS=["R&D","Marketing","Production","Finance","Scorecard","Calibration"];
function render(){
 document.getElementById("rounds").innerHTML=Array.from({length:NR},(_,r)=>
  `<button data-r="${r}" class="${r===S.round?'on':''}">${R(r)}</button>`).join("");
 document.getElementById("tabs").innerHTML=TABS.map((t,i)=>
  `<button data-t="${i}" class="${i===tab?'on':''}">${t}</button>`).join("");
 if(sel>=S.products.length) sel=0;
 const r=S.round;
 document.getElementById("body").innerHTML=
  tab===0?tRD(r):tab===1?tMkt(r):tab===2?tProd(r):tab===3?tFin(r):tab===4?tScore():tCal();
 wire(); save();}

const CARRY=["p","s","m","cap","auto","mat"];
function setField(f,v){
 const r=S.round;
 if(CARRY.includes(f)) for(let k=r;k<NR;k++) S.products[sel].rounds[k][f]=v;
 else S.products[sel].rounds[r][f]=v;}

function wire(){
 document.querySelectorAll("#rounds button").forEach(b=>b.onclick=()=>{S.round=+b.dataset.r;render();});
 document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{tab=+b.dataset.t;render();});
 document.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{
  if(b.dataset.sel==="add"){
   const q=idealAt(2,S.round);
   S.products.push({name:"New "+(S.products.length-4),seg:2,launch:S.round,added:true,
    sp:q.p,ss:q.s,sm:20000,sa:0,m0:14,
    rounds:Array.from({length:NR},()=>({p:q.p,s:q.s,m:20000,date:"",price:35,promo:1000,sales:1000,
     fc:0,cap:400,auto:3,sched:0,inv:0,mat:14,aware:0,access:0}))});
   sel=S.products.length-1;
  }else sel=+b.dataset.sel;
  render();});
 const cc=document.getElementById("ccor"),ct=document.getElementById("ctra");
 if(cc)cc.onchange=()=>{O.corridor=cc.checked;render();};
 if(ct)ct.onchange=()=>{O.trails=ct.checked;render();};
 const clr=document.querySelector("[data-clr]");
 if(clr)clr.onclick=()=>{S.products[sel].rounds[S.round].date="";render();};

 // sliders: live-update the paired bubble while dragging, commit on release
 document.querySelectorAll('input[type=range][data-f]').forEach(el=>{
  const f=el.dataset.f;
  const bub=[...document.querySelectorAll(`input.bub[data-f="${f}"]`)][0];
  el.addEventListener("input",()=>{ if(bub) bub.value=el.value; setField(f,parseFloat(el.value)); });
  el.addEventListener("change",()=>{ setField(f,parseFloat(el.value)); render(); });});
 document.querySelectorAll('input.bub[data-f]').forEach(el=>{
  el.addEventListener("change",()=>{let v=parseFloat(el.value);if(isNaN(v))v=0;
   setField(el.dataset.f,v);render();});});
 document.querySelectorAll('input[type=date][data-f]').forEach(el=>{
  el.addEventListener("change",()=>{S.products[sel].rounds[S.round].date=el.value;render();});});

 document.querySelectorAll('[data-fin]').forEach(el=>{
  const k=el.dataset.fin;
  if(el.type==="range"){
   const bub=[...document.querySelectorAll(`input.bub[data-fin="${k}"]`)][0];
   el.addEventListener("input",()=>{if(bub)bub.value=el.value;S.fin[S.round][k]=parseFloat(el.value);});
   el.addEventListener("change",()=>{S.fin[S.round][k]=parseFloat(el.value);render();});
  }else el.addEventListener("change",()=>{let v=parseFloat(el.value);if(isNaN(v))v=0;
   S.fin[S.round][k]=v;render();});});
 document.querySelectorAll('[data-cal]').forEach(el=>el.addEventListener("change",()=>{
  let v=parseFloat(el.value);if(isNaN(v))v=0;S.cal[el.dataset.cal]=v;render();}));
 document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener("change",()=>{
  let v=parseFloat(el.value);if(isNaN(v))v=0;S.open[el.dataset.open]=v;render();}));}

document.getElementById("bSave").onclick=()=>{
 const b=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(b);
 a.download="digby-capsim-"+new Date().toISOString().slice(0,10)+".json";a.click();
 toast("Saved — put it in the shared Drive folder");};
document.getElementById("bLoad").onclick=()=>document.getElementById("fIn").click();
document.getElementById("fIn").onchange=e=>{const f=e.target.files[0];if(!f)return;
 const rd=new FileReader();rd.onload=()=>{try{const o=JSON.parse(rd.result);if(!o.products)throw 0;
  S=o;if(!S.cal)S.cal={...DEF_CAL};if(!S.open)S.open={...DEF_OPEN};
  S.cal={...DEF_CAL,...S.cal};render();toast("Loaded");}
  catch(x){toast("That file could not be read");}};rd.readAsText(f);};
document.getElementById("bLink").onclick=()=>{
 const d=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
 const u=location.origin+location.pathname+"#d="+d;
 navigator.clipboard.writeText(u).then(()=>toast("Share link copied"),()=>prompt("Copy this link:",u));};
document.getElementById("bReset").onclick=()=>{
 if(confirm("Reset every round back to the seeded board?")){
  S=seed();localStorage.removeItem("digbyCapsim");location.hash="";sel=0;render();toast("Reset");}};
render();
</script>
</body>
</html>
